<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aditi Tracking — Sales KPI Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg-primary: #0a0e17;
    --bg-card: #111827;
    --bg-card-hover: #1a2332;
    --bg-input: #1e293b;
    --border: #1e293b;
    --border-light: #2d3a4d;
    --text-primary: #f1f5f9;
    --text-secondary: #94a3b8;
    --text-muted: #64748b;
    --accent: #22d3ee;
    --accent-dim: rgba(34,211,238,0.12);
    --green: #34d399;
    --green-dim: rgba(52,211,153,0.12);
    --red: #f87171;
    --red-dim: rgba(248,113,113,0.12);
    --amber: #fbbf24;
    --amber-dim: rgba(251,191,36,0.12);
    --purple: #a78bfa;
    --purple-dim: rgba(167,139,250,0.12);
    --blue: #60a5fa;
    --blue-dim: rgba(96,165,250,0.12);
    --orange: #fb923c;
    --orange-dim: rgba(251,146,60,0.12);
    --radius: 12px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
  }
  .grain {
    position: fixed; inset:0; pointer-events:none; z-index:9999; opacity: 0.025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }
  .header {
    padding: 24px 32px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 16px; position: sticky; top:0; z-index:100;
    background: rgba(10,14,23,0.92); backdrop-filter: blur(12px);
  }
  .header-left { display:flex; align-items:center; gap:16px; }
  .logo {
    width:40px; height:40px; border-radius:10px;
    background: linear-gradient(135deg, var(--accent), #6366f1);
    display:flex; align-items:center; justify-content:center;
    font-weight:700; font-size:18px; color:#fff;
  }
  .header h1 { font-size:20px; font-weight:700; letter-spacing:-0.3px; }
  .header h1 span { color: var(--accent); }
  .header-right { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  .date-filter {
    display:flex; align-items:center; gap:8px;
    background: var(--bg-input); border:1px solid var(--border);
    border-radius:8px; padding:6px 12px;
  }
  .date-filter label { font-size:12px; color:var(--text-muted); font-weight:500; }
  .date-filter input {
    background:transparent; border:none; color:var(--text-primary);
    font-family:'DM Sans'; font-size:13px; outline:none;
  }
  input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.7); cursor:pointer; }
  .btn {
    padding:8px 16px; border-radius:8px; border:none; cursor:pointer;
    font-family:'DM Sans'; font-size:13px; font-weight:600;
    display:flex; align-items:center; gap:6px; transition:all 0.2s;
  }
  .btn-primary { background: var(--accent); color:#0a0e17; }
  .btn-primary:hover { background:#67e8f9; }
  .btn-outline { background:transparent; color:var(--text-secondary); border:1px solid var(--border); }
  .btn-outline:hover { border-color:var(--text-muted); color:var(--text-primary); }
  .status-dot { width:8px; height:8px; border-radius:50%; display:inline-block; }
  .status-dot.live { background:var(--green); box-shadow:0 0 8px var(--green); animation: pulse 2s infinite; }
  .status-dot.error { background:var(--red); }
  .status-dot.loading { background:var(--amber); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
  .main { padding:24px 32px; max-width:1600px; margin:0 auto; }
  .tabs {
    display:flex; gap:4px; margin-bottom:24px;
    background: var(--bg-card); border-radius:10px; padding:4px; width:fit-content;
  }
  .tab {
    padding:10px 24px; border-radius:8px; border:none; cursor:pointer;
    font-family:'DM Sans'; font-size:14px; font-weight:600;
    background:transparent; color:var(--text-muted); transition:all 0.2s;
  }
  .tab.active { background:var(--accent-dim); color:var(--accent); box-shadow: inset 0 0 0 1px rgba(34,211,238,0.2); }
  .tab:hover:not(.active) { color:var(--text-secondary); }
  .section { display:none; }
  .section.active { display:block; }
  .kpi-grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap:16px; margin-bottom:24px; }
  .kpi-card {
    background: var(--bg-card); border:1px solid var(--border);
    border-radius: var(--radius); padding:20px; transition: all 0.2s;
  }
  .kpi-card:hover { border-color: var(--border-light); transform:translateY(-1px); }
  .kpi-card .kpi-icon { width:36px; height:36px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:16px; margin-bottom:12px; }
  .kpi-card .kpi-label { font-size:12px; font-weight:500; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:6px; }
  .kpi-card .kpi-value { font-size:28px; font-weight:700; letter-spacing:-0.5px; font-family:'JetBrains Mono', monospace; }
  .kpi-card .kpi-sub { font-size:12px; color:var(--text-muted); margin-top:4px; }
  .charts-grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(420px, 1fr)); gap:16px; margin-bottom:24px; }
  .chart-card { background: var(--bg-card); border:1px solid var(--border); border-radius: var(--radius); padding:20px; }
  .chart-card h3 { font-size:14px; font-weight:600; margin-bottom:16px; color:var(--text-secondary); }
  .chart-container { position:relative; width:100%; }
  .table-card { background: var(--bg-card); border:1px solid var(--border); border-radius: var(--radius); padding:20px; margin-bottom:24px; overflow-x:auto; }
  .table-card h3 { font-size:14px; font-weight:600; margin-bottom:16px; color:var(--text-secondary); }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  thead th { text-align:left; padding:10px 12px; font-weight:600; color:var(--text-muted); border-bottom:1px solid var(--border); font-size:11px; text-transform:uppercase; letter-spacing:0.5px; white-space:nowrap; }
  tbody td { padding:10px 12px; border-bottom:1px solid var(--border); color:var(--text-secondary); white-space:nowrap; }
  tbody tr:hover td { background:var(--bg-card-hover); }
  .badge { display:inline-block; padding:3px 8px; border-radius:6px; font-size:11px; font-weight:600; }
  .badge-green { background:var(--green-dim); color:var(--green); }
  .badge-red { background:var(--red-dim); color:var(--red); }
  .badge-amber { background:var(--amber-dim); color:var(--amber); }
  .badge-blue { background:var(--blue-dim); color:var(--blue); }
  .badge-purple { background:var(--purple-dim); color:var(--purple); }
  .split-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:24px; }
  .split-card { background: var(--bg-card); border:1px solid var(--border); border-radius: var(--radius); padding:20px; }
  .split-card h3 { font-size:13px; font-weight:600; margin-bottom:16px; display:flex; align-items:center; gap:8px; }
  .split-card h3 .dot { width:10px; height:10px; border-radius:50%; }
  .loading-overlay { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:80px 20px; gap:16px; }
  .spinner { width:40px; height:40px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .error-banner { background:var(--red-dim); border:1px solid rgba(248,113,113,0.3); border-radius:10px; padding:16px 20px; margin-bottom:24px; display:flex; align-items:center; gap:12px; font-size:13px; color:var(--red); }
  .error-banner.hidden { display:none; }
  .last-updated { font-size:11px; color:var(--text-muted); font-family:'JetBrains Mono'; }
  @media (max-width:768px) {
    .header { padding:16px; } .main { padding:16px; }
    .charts-grid { grid-template-columns:1fr; } .split-grid { grid-template-columns:1fr; }
    .kpi-grid { grid-template-columns: repeat(2,1fr); }
    .tabs { width:100%; } .tab { flex:1; text-align:center; padding:10px 12px; font-size:13px; }
  }
</style>
</head>
<body>
<div class="grain"></div>
<header class="header">
  <div class="header-left">
    <div class="logo">AT</div>
    <h1>Sales <span>KPI</span> Dashboard</h1>
  </div>
  <div class="header-right">
    <span id="statusIndicator" style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-muted);">
      <span class="status-dot loading"></span><span>Connecting...</span>
    </span>
    <span id="lastUpdated" class="last-updated"></span>
    <div class="date-filter"><label>From</label><input type="date" id="dateFrom"></div>
    <div class="date-filter"><label>To</label><input type="date" id="dateTo"></div>
    <button class="btn btn-primary" onclick="applyFilters()">Apply</button>
    <button class="btn btn-outline" onclick="resetFilters()">Reset</button>
    <button class="btn btn-outline" onclick="fetchAllData()" title="Refresh now">🔄</button>
  </div>
</header>
<main class="main">
  <div class="error-banner hidden" id="errorBanner"><span>⚠️</span><span id="errorText"></span></div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('overview',this)">Overview</button>
    <button class="tab" onclick="switchTab('inside',this)">Inside Sales</button>
    <button class="tab" onclick="switchTab('field',this)">Field Sales</button>
  </div>
  <div class="section active" id="sec-overview"><div id="overviewContent"><div class="loading-overlay"><div class="spinner"></div><span style="color:var(--text-muted);font-size:13px;">Loading dashboard...</span></div></div></div>
  <div class="section" id="sec-inside"><div id="insideContent"><div class="loading-overlay"><div class="spinner"></div><span style="color:var(--text-muted);font-size:13px;">Loading inside sales...</span></div></div></div>
  <div class="section" id="sec-field"><div id="fieldContent"><div class="loading-overlay"><div class="spinner"></div><span style="color:var(--text-muted);font-size:13px;">Loading field sales...</span></div></div></div>
</main>
<script>
// ========== HARDCODED API URLS ==========
const INSIDE_SALES_API = "https://script.google.com/macros/s/AKfycbxsC_glUfbC5RJSs0BPFYQI5jbsM5p6VeIraKcl-cO8zC8VjVnLqFYQuumhRP69oEy2/exec";
const FIELD_SALES_API  = "https://script.google.com/macros/s/AKfycbyPgpnZ31W0qhSL3fVJOC0UbVadmwiZyaPcLpiGdYertNEkYIjNe6u5LVNEZIrSsF0u_Q/exec";

let insideData=[], fieldData=[], filteredInsideData=[], filteredFieldData=[], chartInstances={};

function setStatus(t,txt){document.getElementById('statusIndicator').innerHTML='<span class="status-dot '+t+'"></span><span>'+txt+'</span>';}
function showError(m){document.getElementById('errorBanner').classList.remove('hidden');document.getElementById('errorText').textContent=m;}
function hideError(){document.getElementById('errorBanner').classList.add('hidden');}

async function fetchSheet(url){
  const res = await fetch(url, {redirect:'follow'});
  const text = await res.text();
  try{
    const json = JSON.parse(text);
    if(Array.isArray(json)) return json;
    // Google sometimes wraps in an object
    if(json && typeof json === 'object'){
      // Check common wrapper keys
      for(const k of Object.keys(json)){
        if(Array.isArray(json[k])) return json[k];
      }
    }
    console.warn('API returned non-array:', typeof json, json);
    return [];
  }catch(e){
    console.error('JSON parse failed. Raw response:', text.substring(0,500));
    return [];
  }
}

async function fetchAllData(){
  setStatus('loading','Fetching data...'); hideError();
  try{
    const[insRes,fldRes]=await Promise.allSettled([
      fetchSheet(INSIDE_SALES_API),
      fetchSheet(FIELD_SALES_API)
    ]);
    let iOk=false,fOk=false;

    if(insRes.status==='fulfilled' && Array.isArray(insRes.value)){
      insideData=insRes.value; iOk=insideData.length>0;
    }else{
      insideData=[]; console.error('IS err:',insRes.reason||'empty/invalid response');
    }

    if(fldRes.status==='fulfilled' && Array.isArray(fldRes.value)){
      fieldData=fldRes.value; fOk=fieldData.length>0;
    }else{
      fieldData=[]; console.error('FS err:',fldRes.reason||'empty/invalid response');
    }

    filteredInsideData=insideData.slice(); filteredFieldData=fieldData.slice();

    if(iOk&&fOk) setStatus('live','Live · '+(insideData.length+fieldData.length)+' records');
    else if(iOk||fOk){setStatus('live','Partial · '+(insideData.length+fieldData.length)+' records');showError('One API returned empty or failed. Showing available data.');}
    else{setStatus('error','Failed');showError('Both APIs returned empty or failed. Open browser console (F12) for details.');}
    document.getElementById('lastUpdated').textContent='Updated '+new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
    renderAll();
  }catch(e){console.error('Fetch error:',e);setStatus('error','Error');showError('Network error: '+e.message);}
}

function parseDate(v){
  if(!v)return null; if(v instanceof Date)return v;
  const s=String(v).trim();
  const m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})/);
  if(m){let y=parseInt(m[3]);if(y<100)y+=2000;return new Date(y,parseInt(m[2])-1,parseInt(m[1]));}
  const d=new Date(s);return isNaN(d.getTime())?null:d;
}

function applyFilters(){
  const fr=document.getElementById('dateFrom').value?new Date(document.getElementById('dateFrom').value):null;
  const to=document.getElementById('dateTo').value?new Date(document.getElementById('dateTo').value+'T23:59:59'):null;
  filteredInsideData=(Array.isArray(insideData)?insideData:[]).filter(r=>{const d=parseDate(r['Timestamp']);if(!d)return true;if(fr&&d<fr)return false;if(to&&d>to)return false;return true;});
  filteredFieldData=(Array.isArray(fieldData)?fieldData:[]).filter(r=>{const d=parseDate(r['Timestamp']||r['Date']);if(!d)return true;if(fr&&d<fr)return false;if(to&&d>to)return false;return true;});
  renderAll();
}
function resetFilters(){document.getElementById('dateFrom').value='';document.getElementById('dateTo').value='';filteredInsideData=(Array.isArray(insideData)?insideData:[]).slice();filteredFieldData=(Array.isArray(fieldData)?fieldData:[]).slice();renderAll();}

function switchTab(tab,el){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));el.classList.add('active');document.getElementById('sec-'+tab).classList.add('active');}

function fmt(n){if(n>=10000000)return'₹'+(n/10000000).toFixed(1)+' Cr';if(n>=100000)return'₹'+(n/100000).toFixed(1)+' L';if(n>=1000)return'₹'+(n/1000).toFixed(1)+'K';return'₹'+n.toLocaleString('en-IN');}
function num(n){return Number(n)||0;}
function isYes(v){return v&&String(v).trim().toLowerCase()==='yes';}
function has(v){return v!==null&&v!==undefined&&v!=='';}
function dc(id){if(chartInstances[id]){chartInstances[id].destroy();delete chartInstances[id];}}

const cDef={responsive:true,maintainAspectRatio:false,
  plugins:{legend:{labels:{color:'#94a3b8',font:{family:'DM Sans',size:11},padding:12,usePointStyle:true,pointStyleWidth:8}},tooltip:{backgroundColor:'#1e293b',titleColor:'#f1f5f9',bodyColor:'#94a3b8',borderColor:'#2d3a4d',borderWidth:1,padding:10,titleFont:{family:'DM Sans',weight:'600'},bodyFont:{family:'DM Sans'},cornerRadius:8}},
  scales:{x:{ticks:{color:'#64748b',font:{family:'DM Sans',size:11}},grid:{color:'rgba(30,41,59,0.5)'}},y:{ticks:{color:'#64748b',font:{family:'DM Sans',size:11}},grid:{color:'rgba(30,41,59,0.5)'}}}
};

function compIS(data){
  const t=data.length;
  const vl=data.filter(r=>String(r['Lead Quality']||'').toLowerCase()!=='junk'&&has(r['Customer Name'])).length;
  const tc=data.filter(r=>has(r['1st Call'])||isYes(r['1st Call'])).length;
  const dg=data.filter(r=>isYes(r['Is the Demo Given'])).length;
  const f1=data.filter(r=>has(r['Follow-up 1 '])||has(r['Follow-up 1'])).length;
  const f2=data.filter(r=>has(r['Follow-up 2 '])||has(r['Follow-up 2'])).length;
  const f3=data.filter(r=>has(r['Follow-up 3'])).length;
  const qs=data.filter(r=>isYes(r['Quotation Sent'])).length;
  const w=data.filter(r=>isYes(r['Won'])).length;
  const l=data.filter(r=>has(r['Lost'])&&!isYes(r['Won'])).length;
  const rev=data.reduce((s,r)=>s+num(r['Order Value']),0);
  const hot=data.filter(r=>String(r['LeadType']||'').toLowerCase()==='hot').length;
  const warm=data.filter(r=>String(r['LeadType']||'').toLowerCase()==='warm').length;
  const cold=data.filter(r=>String(r['LeadType']||'').toLowerCase()==='cold').length;
  const src={};data.forEach(r=>{const s=r['Source']||'Unknown';src[s]=(src[s]||0)+1;});
  const sol={};data.forEach(r=>{const s=r['Solution']||'Unknown';sol[s]=(sol[s]||0)+1;});
  const wr=qs>0?((w/qs)*100).toFixed(1):0;
  const rbs={};data.filter(r=>isYes(r['Won'])).forEach(r=>{const s=r['Source']||'Unknown';rbs[s]=(rbs[s]||0)+num(r['Order Value']);});
  const junk=data.filter(r=>String(r['Lead Quality']||'').toLowerCase()==='junk'||String(r['Remarks']||'').toLowerCase().includes('junk')).length;
  const wd=data.filter(r=>isYes(r['Won'])&&num(r['Order Value'])>0);
  const avg=wd.length>0?wd.reduce((s,r)=>s+num(r['Order Value']),0)/wd.length:0;
  return{t,vl,tc,dg,f1,f2,f3,qs,w,l,rev,hot,warm,cold,src,sol,wr,rbs,junk,avg};
}

function compFS(data){
  const t=data.length, pc='Purpose of Visit';
  const nv=data.filter(r=>String(r[pc]||'').toLowerCase().includes('new')).length;
  const ev=data.filter(r=>{const v=String(r[pc]||'').toLowerCase();return v.includes('exisiting')||v.includes('existing');}).length;
  const fv=data.filter(r=>String(r[pc]||'').toLowerCase().includes('follow')).length;
  const int=data.filter(r=>{const v=String(r['Winning Chances']||'').toLowerCase();return(v.includes('intersted')||v.includes('interested'))&&!v.includes('not');}).length;
  const nint=data.filter(r=>String(r['Winning Chances']||'').toLowerCase().includes('not inter')).length;
  const ter=data.reduce((s,r)=>{const v=num(r['Expected Revenue (₹)']||r['Expected Revenue']);return s+(v>1?v:0);},0);
  const bsp={};data.forEach(r=>{const sp=r['Sales Person Name']||'Unknown';if(!bsp[sp])bsp[sp]={vis:0,nv:0,ev:0,rev:0};bsp[sp].vis++;if(String(r[pc]||'').toLowerCase().includes('new'))bsp[sp].nv++;if(String(r[pc]||'').toLowerCase().match(/exisit|exist/))bsp[sp].ev++;const v=num(r['Expected Revenue (₹)']||r['Expected Revenue']);bsp[sp].rev+=(v>1?v:0);});
  const bpd={};data.forEach(r=>{const p=r['Product']||'Unknown';bpd[p]=(bpd[p]||0)+1;});
  let nr=0,er=0;data.forEach(r=>{const v=num(r['Expected Revenue (₹)']||r['Expected Revenue']);if(v<=1)return;const p=String(r[pc]||'').toLowerCase();if(p.match(/exisit|exist/))er+=v;else nr+=v;});
  return{t,nv,ev,fv,int,nint,ter,bsp,bpd,nr,er};
}

function renderAll(){renderOV();renderIS();renderFS();}

function renderOV(){
  const i=compIS(filteredInsideData),f=compFS(filteredFieldData);
  document.getElementById('overviewContent').innerHTML=`
    <div class="kpi-grid">
      <div class="kpi-card"><div class="kpi-icon" style="background:var(--accent-dim);color:var(--accent);">📞</div><div class="kpi-label">Inside Sales Leads</div><div class="kpi-value">${i.t}</div><div class="kpi-sub">Valid: ${i.vl} · Junk: ${i.junk}</div></div>
      <div class="kpi-card"><div class="kpi-icon" style="background:var(--blue-dim);color:var(--blue);">🚗</div><div class="kpi-label">Field Visits</div><div class="kpi-value">${f.t}</div><div class="kpi-sub">New: ${f.nv} · Existing: ${f.ev}</div></div>
      <div class="kpi-card"><div class="kpi-icon" style="background:var(--green-dim);color:var(--green);">✅</div><div class="kpi-label">Deals Won (IS)</div><div class="kpi-value">${i.w}</div><div class="kpi-sub">Win Rate: ${i.wr}%</div></div>
      <div class="kpi-card"><div class="kpi-icon" style="background:var(--red-dim);color:var(--red);">❌</div><div class="kpi-label">Deals Lost (IS)</div><div class="kpi-value">${i.l}</div></div>
      <div class="kpi-card"><div class="kpi-icon" style="background:var(--green-dim);color:var(--green);">💰</div><div class="kpi-label">IS Revenue (Won)</div><div class="kpi-value" style="color:var(--green);">${fmt(i.rev)}</div><div class="kpi-sub">Avg deal: ${fmt(Math.round(i.avg))}</div></div>
      <div class="kpi-card"><div class="kpi-icon" style="background:var(--purple-dim);color:var(--purple);">📊</div><div class="kpi-label">FS Expected Revenue</div><div class="kpi-value" style="color:var(--purple);">${fmt(f.ter)}</div><div class="kpi-sub">NBD: ${fmt(f.nr)} · Exist: ${fmt(f.er)}</div></div>
      <div class="kpi-card"><div class="kpi-icon" style="background:var(--amber-dim);color:var(--amber);">📨</div><div class="kpi-label">Quotations Sent (IS)</div><div class="kpi-value">${i.qs}</div></div>
