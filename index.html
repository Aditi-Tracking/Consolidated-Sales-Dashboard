<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aditi Tracking — Sales KPI Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  :root {
    --bg-primary: #0a0e17;
    --bg-card: #111827;
    --bg-card-hover: #1a2332;
    --bg-input: #1e293b;
    --border: #1e293b;
    --border-light: #2d3a4d;
    --text-primary: #f1f5f9;
    --text-secondary: #94a3b8;
    --text-muted: #64748b;
    --accent: #22d3ee;
    --accent-dim: rgba(34,211,238,0.12);
    --green: #34d399;
    --green-dim: rgba(52,211,153,0.12);
    --red: #f87171;
    --red-dim: rgba(248,113,113,0.12);
    --amber: #fbbf24;
    --amber-dim: rgba(251,191,36,0.12);
    --purple: #a78bfa;
    --purple-dim: rgba(167,139,250,0.12);
    --blue: #60a5fa;
    --blue-dim: rgba(96,165,250,0.12);
    --orange: #fb923c;
    --orange-dim: rgba(251,146,60,0.12);
    --radius: 12px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
  }
  .grain {
    position: fixed; inset:0; pointer-events:none; z-index:9999; opacity: 0.025;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }
  .header {
    padding: 24px 32px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 16px; position: sticky; top:0; z-index:100;
    background: rgba(10,14,23,0.92); backdrop-filter: blur(12px);
  }
  .header-left { display:flex; align-items:center; gap:16px; }
  .logo {
    width:40px; height:40px; border-radius:10px;
    background: linear-gradient(135deg, var(--accent), #6366f1);
    display:flex; align-items:center; justify-content:center;
    font-weight:700; font-size:18px; color:#fff;
  }
  .header h1 { font-size:20px; font-weight:700; letter-spacing:-0.3px; }
  .header h1 span { color: var(--accent); }
  .header-right { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  .date-filter {
    display:flex; align-items:center; gap:8px;
    background: var(--bg-input); border:1px solid var(--border);
    border-radius:8px; padding:6px 12px;
  }
  .date-filter label { font-size:12px; color:var(--text-muted); font-weight:500; }
  .date-filter input {
    background:transparent; border:none; color:var(--text-primary);
    font-family:'DM Sans'; font-size:13px; outline:none;
  }
  input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.7); cursor:pointer; }
  .btn {
    padding:8px 16px; border-radius:8px; border:none; cursor:pointer;
    font-family:'DM Sans'; font-size:13px; font-weight:600;
    display:flex; align-items:center; gap:6px; transition:all 0.2s;
  }
  .btn-primary { background: var(--accent); color:#0a0e17; }
  .btn-primary:hover { background:#67e8f9; }
  .btn-outline { background:transparent; color:var(--text-secondary); border:1px solid var(--border); }
  .btn-outline:hover { border-color:var(--text-muted); color:var(--text-primary); }
  .status-dot { width:8px; height:8px; border-radius:50%; display:inline-block; }
  .status-dot.live { background:var(--green); box-shadow:0 0 8px var(--green); animation: pulse 2s infinite; }
  .status-dot.error { background:var(--red); }
  .status-dot.loading { background:var(--amber); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
  .main { padding:24px 32px; max-width:1600px; margin:0 auto; }
  .tabs {
    display:flex; gap:4px; margin-bottom:24px;
    background: var(--bg-card); border-radius:10px; padding:4px; width:fit-content;
  }
  .tab {
    padding:10px 24px; border-radius:8px; border:none; cursor:pointer;
    font-family:'DM Sans'; font-size:14px; font-weight:600;
    background:transparent; color:var(--text-muted); transition:all 0.2s;
  }
  .tab.active { background:var(--accent-dim); color:var(--accent); box-shadow: inset 0 0 0 1px rgba(34,211,238,0.2); }
  .tab:hover:not(.active) { color:var(--text-secondary); }
  .section { display:none; }
  .section.active { display:block; }
  .kpi-grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap:16px; margin-bottom:24px; }
  .kpi-card {
    background: var(--bg-card); border:1px solid var(--border);
    border-radius: var(--radius); padding:20px; transition: all 0.2s;
  }
  .kpi-card:hover { border-color: var(--border-light); transform:translateY(-1px); }
  .kpi-card .kpi-icon { width:36px; height:36px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:16px; margin-bottom:12px; }
  .kpi-card .kpi-label { font-size:12px; font-weight:500; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:6px; }
  .kpi-card .kpi-value { font-size:28px; font-weight:700; letter-spacing:-0.5px; font-family:'JetBrains Mono', monospace; }
  .kpi-card .kpi-sub { font-size:12px; color:var(--text-muted); margin-top:4px; }
  .charts-grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(420px, 1fr)); gap:16px; margin-bottom:24px; }
  .chart-card { background: var(--bg-card); border:1px solid var(--border); border-radius: var(--radius); padding:20px; }
  .chart-card h3 { font-size:14px; font-weight:600; margin-bottom:16px; color:var(--text-secondary); }
  .chart-container { position:relative; width:100%; }
  .table-card { background: var(--bg-card); border:1px solid var(--border); border-radius: var(--radius); padding:20px; margin-bottom:24px; overflow-x:auto; }
  .table-card h3 { font-size:14px; font-weight:600; margin-bottom:16px; color:var(--text-secondary); }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  thead th { text-align:left; padding:10px 12px; font-weight:600; color:var(--text-muted); border-bottom:1px solid var(--border); font-size:11px; text-transform:uppercase; letter-spacing:0.5px; white-space:nowrap; }
  tbody td { padding:10px 12px; border-bottom:1px solid var(--border); color:var(--text-secondary); white-space:nowrap; }
  tbody tr:hover td { background:var(--bg-card-hover); }
  .badge { display:inline-block; padding:3px 8px; border-radius:6px; font-size:11px; font-weight:600; }
  .badge-green { background:var(--green-dim); color:var(--green); }
  .badge-red { background:var(--red-dim); color:var(--red); }
  .badge-amber { background:var(--amber-dim); color:var(--amber); }
  .badge-blue { background:var(--blue-dim); color:var(--blue); }
  .badge-purple { background:var(--purple-dim); color:var(--purple); }
  .badge-accent { background:var(--accent-dim); color:var(--accent); }
  .split-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:24px; }
  .split-card { background: var(--bg-card); border:1px solid var(--border); border-radius: var(--radius); padding:20px; }
  .split-card h3 { font-size:13px; font-weight:600; margin-bottom:16px; display:flex; align-items:center; gap:8px; }
  .split-card h3 .dot { width:10px; height:10px; border-radius:50%; }
  /* Pipeline bar */
  .pipeline-wrap { background: var(--bg-card); border:1px solid var(--border); border-radius:var(--radius); padding:20px; margin-bottom:24px; }
  .pipeline-wrap h3 { font-size:14px; font-weight:600; margin-bottom:16px; color:var(--text-secondary); }
  .pipeline { display:flex; align-items:stretch; gap:0; border-radius:10px; overflow:hidden; border:1px solid var(--border); }
  .pipe-step { flex:1; padding:16px 14px; background:var(--bg-card-hover); position:relative; border-right:1px solid var(--border); }
  .pipe-step:last-child { border-right:none; }
  .pipe-step::after { content:'›'; position:absolute; right:-9px; top:50%; transform:translateY(-50%); color:var(--text-muted); font-size:18px; z-index:2; pointer-events:none; }
  .pipe-step:last-child::after { display:none; }
  .pipe-label { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:0.7px; color:var(--text-muted); margin-bottom:8px; }
  .pipe-val { font-family:'JetBrains Mono'; font-size:22px; font-weight:700; }
  .pipe-pct { font-size:11px; color:var(--text-muted); margin-top:3px; }
  .pipe-bar { height:3px; border-radius:3px; margin-top:10px; opacity:0.7; }
  .loading-overlay { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:80px 20px; gap:16px; }
  .spinner { width:40px; height:40px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .error-banner { background:var(--red-dim); border:1px solid rgba(248,113,113,0.3); border-radius:10px; padding:16px 20px; margin-bottom:24px; display:flex; align-items:center; gap:12px; font-size:13px; color:var(--red); }
  .error-banner.hidden { display:none; }
  .last-updated { font-size:11px; color:var(--text-muted); font-family:'JetBrains Mono'; }
  @media (max-width:768px) {
    .header { padding:16px; } .main { padding:16px; }
    .charts-grid { grid-template-columns:1fr; } .split-grid { grid-template-columns:1fr; }
    .kpi-grid { grid-template-columns: repeat(2,1fr); }
    .tabs { width:100%; } .tab { flex:1; text-align:center; padding:10px 12px; font-size:13px; }
    .pipeline { flex-direction:column; }
    .pipe-step::after { display:none; }
  }
</style>
</head>
<body>
<div class="grain"></div>
<header class="header">
  <div class="header-left">
    <div class="logo">AT</div>
    <h1>Sales <span>KPI</span> Dashboard</h1>
  </div>
  <div class="header-right">
    <span id="statusIndicator" style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-muted);">
      <span class="status-dot loading"></span><span>Connecting...</span>
    </span>
    <span id="lastUpdated" class="last-updated"></span>
    <div class="date-filter"><label>From</label><input type="date" id="dateFrom"></div>
    <div class="date-filter"><label>To</label><input type="date" id="dateTo"></div>
    <button class="btn btn-primary" onclick="applyFilters()">Apply</button>
    <button class="btn btn-outline" onclick="resetFilters()">Reset</button>
    <button class="btn btn-outline" onclick="fetchAllData()" title="Refresh now">🔄</button>
  </div>
</header>
<main class="main">
  <div class="error-banner hidden" id="errorBanner"><span>⚠️</span><span id="errorText"></span></div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('overview',this)">Overview</button>
    <button class="tab" onclick="switchTab('inside',this)">Inside Sales</button>
    <button class="tab" onclick="switchTab('field',this)">Field Sales</button>
  </div>
  <div class="section active" id="sec-overview"><div id="overviewContent"><div class="loading-overlay"><div class="spinner"></div><span style="color:var(--text-muted);font-size:13px;">Loading dashboard...</span></div></div></div>
  <div class="section" id="sec-inside"><div id="insideContent"><div class="loading-overlay"><div class="spinner"></div><span style="color:var(--text-muted);font-size:13px;">Loading inside sales...</span></div></div></div>
  <div class="section" id="sec-field"><div id="fieldContent"><div class="loading-overlay"><div class="spinner"></div><span style="color:var(--text-muted);font-size:13px;">Loading field sales...</span></div></div></div>
</main>
<script>
// ============================================================
//  API ENDPOINTS
// ============================================================
const INSIDE_SALES_API = "https://script.google.com/macros/s/AKfycbxsC_glUfbC5RJSs0BPFYQI5jbsM5p6VeIraKcl-cO8zC8VjVnLqFYQuumhRP69oEy2/exec";
const FIELD_SALES_API  = "https://script.google.com/macros/s/AKfycbyPgpnZ31W0qhSL3fVJOC0UbVadmwiZyaPcLpiGdYertNEkYIjNe6u5LVNEZIrSsF0u_Q/exec";

// ============================================================
//  STATE
// ============================================================
let insideData=[], fieldData=[], filteredInsideData=[], filteredFieldData=[], chartInstances={};

// ============================================================
//  UTILITIES
// ============================================================
function setStatus(t,txt){ document.getElementById('statusIndicator').innerHTML='<span class="status-dot '+t+'"></span><span>'+txt+'</span>'; }
function showError(m){ document.getElementById('errorBanner').classList.remove('hidden'); document.getElementById('errorText').textContent=m; }
function hideError(){ document.getElementById('errorBanner').classList.add('hidden'); }
function num(n){ return Number(n)||0; }
function has(v){ return v!==null&&v!==undefined&&v!==''; }
function isYes(v){ return v&&String(v).trim().toLowerCase()==='yes'; }
function pct(a,b){ return b>0?((a/b)*100).toFixed(0)+'%':'—'; }

function fmt(n){
  if(n>=10000000) return '₹'+(n/10000000).toFixed(2)+' Cr';
  if(n>=100000)   return '₹'+(n/100000).toFixed(1)+' L';
  if(n>=1000)     return '₹'+(n/1000).toFixed(1)+'K';
  return '₹'+n.toLocaleString('en-IN');
}

function parseDate(v){
  if(!v) return null;
  if(v instanceof Date) return isNaN(v)?null:v;
  const s=String(v).trim();
  const m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})/);
  if(m){ let y=parseInt(m[3]); if(y<100)y+=2000; const d=new Date(y,parseInt(m[2])-1,parseInt(m[1])); return isNaN(d)?null:d; }
  const d=new Date(s); return isNaN(d.getTime())?null:d;
}

// Auto-detect Expected Revenue column — scans row keys for anything containing "revenue"
let _erCol = null;
function getERCol(data){
  if(_erCol) return _erCol;
  if(!data||!data.length) return null;
  const keys=Object.keys(data[0]);
  const exact=['Expected Revenue (₹)','Expected Revenue','ExpectedRevenue','Expected Revenue(Rs)','Expected Revenue (Rs)'];
  for(const e of exact) if(keys.includes(e)){_erCol=e;return _erCol;}
  const fuzzy=keys.find(k=>k.toLowerCase().includes('revenue'));
  if(fuzzy){_erCol=fuzzy;return _erCol;}
  console.warn('FS: No revenue column found. Available keys:',keys);
  return null;
}
function getER(r,col){
  if(!col) return 0;
  const raw=r[col];
  if(raw===null||raw===undefined||raw==='') return 0;
  const cleaned=String(raw).replace(/[₹,\s]/g,'');
  const v=parseFloat(cleaned);
  return isNaN(v)?0:v;
}

// Detect email column (checks multiple possible names)
const EMAIL_FIELDS=['Email','email','Email ID','EmailID','Customer Email','Email Address','E-mail','EMail'];
function getEmail(r){
  for(const f of EMAIL_FIELDS) if(r[f]&&String(r[f]).trim()) return String(r[f]).trim().toLowerCase();
  // Fallback: phone or customer name to identify same lead
  return (r['Phone']||r['Mobile']||r['Customer Name']||'').toString().trim().toLowerCase();
}

function dc(id){ if(chartInstances[id]){ chartInstances[id].destroy(); delete chartInstances[id]; } }

const cDef={
  responsive:true, maintainAspectRatio:false,
  plugins:{
    legend:{labels:{color:'#94a3b8',font:{family:'DM Sans',size:11},padding:12,usePointStyle:true,pointStyleWidth:8}},
    tooltip:{backgroundColor:'#1e293b',titleColor:'#f1f5f9',bodyColor:'#94a3b8',borderColor:'#2d3a4d',borderWidth:1,padding:10,titleFont:{family:'DM Sans',weight:'600'},bodyFont:{family:'DM Sans'},cornerRadius:8}
  },
  scales:{
    x:{ticks:{color:'#64748b',font:{family:'DM Sans',size:11}},grid:{color:'rgba(30,41,59,0.5)'}},
    y:{ticks:{color:'#64748b',font:{family:'DM Sans',size:11}},grid:{color:'rgba(30,41,59,0.5)'}}
  }
};

// ============================================================
//  FETCH
// ============================================================
async function fetchSheet(url){
  const res=await fetch(url,{redirect:'follow'});
  const text=await res.text();
  try{
    const json=JSON.parse(text);
    if(Array.isArray(json)) return json;
    if(json&&typeof json==='object') for(const k of Object.keys(json)) if(Array.isArray(json[k])) return json[k];
    console.warn('API non-array:',typeof json,json); return [];
  }catch(e){ console.error('JSON parse fail. Raw:',text.substring(0,500)); return []; }
}

async function fetchAllData(){
  setStatus('loading','Fetching data...'); hideError();
  try{
    const[insRes,fldRes]=await Promise.allSettled([fetchSheet(INSIDE_SALES_API),fetchSheet(FIELD_SALES_API)]);
    let iOk=false,fOk=false;
    if(insRes.status==='fulfilled'&&Array.isArray(insRes.value)){ insideData=insRes.value; iOk=insideData.length>0; }
    else{ insideData=[]; console.error('IS err:',insRes.reason||'empty'); }
    if(fldRes.status==='fulfilled'&&Array.isArray(fldRes.value)){ fieldData=fldRes.value; fOk=fieldData.length>0; }
    else{ fieldData=[]; console.error('FS err:',fldRes.reason||'empty'); }
    filteredInsideData=insideData.slice(); filteredFieldData=fieldData.slice();
    if(iOk&&fOk) setStatus('live','Live · '+(insideData.length+fieldData.length)+' records');
    else if(iOk||fOk){ setStatus('live','Partial · '+(insideData.length+fieldData.length)+' records'); showError('One API returned empty. Showing available data.'); }
    else{ setStatus('error','Failed'); showError('Both APIs returned empty. Open browser console (F12) for details.'); }
    document.getElementById('lastUpdated').textContent='Updated '+new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
    renderAll();
  }catch(e){ console.error('Fetch error:',e); setStatus('error','Error'); showError('Network error: '+e.message); }
}

// ============================================================
//  FILTERS
// ============================================================
function applyFilters(){
  const fr=document.getElementById('dateFrom').value?new Date(document.getElementById('dateFrom').value):null;
  const to=document.getElementById('dateTo').value?new Date(document.getElementById('dateTo').value+'T23:59:59'):null;
  filteredInsideData=(insideData||[]).filter(r=>{const d=parseDate(r['Timestamp']);if(!d)return true;if(fr&&d<fr)return false;if(to&&d>to)return false;return true;});
  filteredFieldData=(fieldData||[]).filter(r=>{const d=parseDate(r['Timestamp']||r['Date']);if(!d)return true;if(fr&&d<fr)return false;if(to&&d>to)return false;return true;});
  renderAll();
}
function resetFilters(){
  document.getElementById('dateFrom').value=''; document.getElementById('dateTo').value='';
  filteredInsideData=insideData.slice(); filteredFieldData=fieldData.slice(); renderAll();
}
function switchTab(tab,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  el.classList.add('active'); document.getElementById('sec-'+tab).classList.add('active');
}

// ============================================================
//  INSIDE SALES COMPUTATION
// ============================================================
function compIS(data){
  // Build first-contact date map from the FULL (unfiltered) dataset
  // so the 60-day rule is always measured from original first contact
  const allIS = insideData.length>0 ? insideData : data;
  const firstContact={};
  allIS.forEach(r=>{
    const em=getEmail(r); if(!em) return;
    const d=parseDate(r['Timestamp']);
    if(d&&(!firstContact[em]||d<firstContact[em])) firstContact[em]=d;
  });

  const t=data.length;

  // NEW leads = first-ever appearance of that email/identifier
  const seenNew=new Set();
  let newLeads=0;
  [...data].sort((a,b)=>(parseDate(a['Timestamp'])||0)-(parseDate(b['Timestamp'])||0))
    .forEach(r=>{ const em=getEmail(r); if(!seenNew.has(em)){seenNew.add(em);newLeads++;} });

  // FOLLOW-UP calls = rows where any follow-up column is filled
  const followUps=data.filter(r=>
    has(r['Follow-up 1 '])||has(r['Follow-up 1'])||
    has(r['Follow-up 2 '])||has(r['Follow-up 2'])||
    has(r['Follow-up 3'])
  ).length;

  const dg   = data.filter(r=>isYes(r['Is the Demo Given'])).length;
  const qs   = data.filter(r=>isYes(r['Quotation Sent'])).length;
  const wonRows = data.filter(r=>isYes(r['Won']));
  const w    = wonRows.length;
  const l    = data.filter(r=>has(r['Lost'])&&!isYes(r['Won'])).length;
  const junk = data.filter(r=>String(r['Lead Quality']||'').toLowerCase()==='junk'||String(r['Remarks']||'').toLowerCase().includes('junk')).length;
  const wr   = qs>0?((w/qs)*100).toFixed(1):0;

  // NBD vs Existing — 60-day rule applied per closed deal
  let totalRev=0, nbdRev=0, exRev=0, nbdWon=0, exWon=0;
  wonRows.forEach(r=>{
    const val=num(r['Order Value']); totalRev+=val;
    const em=getEmail(r);
    const firstD=firstContact[em];
    const wonD=parseDate(r['Timestamp']);
    const days=(firstD&&wonD)?(wonD-firstD)/86400000:0;
    if(days<=60){ nbdRev+=val; nbdWon++; } else { exRev+=val; exWon++; }
  });

  const avg=w>0?totalRev/w:0;

  // Lead temperature
  const hot  = data.filter(r=>String(r['LeadType']||r['Lead Type']||'').toLowerCase()==='hot').length;
  const warm = data.filter(r=>String(r['LeadType']||r['Lead Type']||'').toLowerCase()==='warm').length;
  const cold = data.filter(r=>String(r['LeadType']||r['Lead Type']||'').toLowerCase()==='cold').length;

  // Source / Solution maps
  const src={}, sol={}, rbs={};
  data.forEach(r=>{ const s=r['Source']||'Unknown'; src[s]=(src[s]||0)+1; });
  data.forEach(r=>{ const s=r['Solution']||'Unknown'; sol[s]=(sol[s]||0)+1; });
  wonRows.forEach(r=>{ const s=r['Source']||'Unknown'; rbs[s]=(rbs[s]||0)+num(r['Order Value']); });

  // Follow-up breakdown
  const f1=data.filter(r=>has(r['Follow-up 1 '])||has(r['Follow-up 1'])).length;
  const f2=data.filter(r=>has(r['Follow-up 2 '])||has(r['Follow-up 2'])).length;
  const f3=data.filter(r=>has(r['Follow-up 3'])).length;

  return{t,newLeads,followUps,f1,f2,f3,dg,qs,w,l,junk,wr,totalRev,nbdRev,exRev,nbdWon,exWon,avg,hot,warm,cold,src,sol,rbs,wonRows,firstContact};
}

// ============================================================
//  FIELD SALES COMPUTATION
// ============================================================
function compFS(data){
  const t=data.length, pc='Purpose of Visit';
  const nv = data.filter(r=>String(r[pc]||'').toLowerCase().includes('new')).length;
  const ev = data.filter(r=>{ const v=String(r[pc]||'').toLowerCase(); return v.includes('exisit')||v.includes('exist'); }).length;
  const fv = data.filter(r=>String(r[pc]||'').toLowerCase().includes('follow')).length;
  const int_= data.filter(r=>{ const v=String(r['Winning Chances']||'').toLowerCase(); return (v.includes('intersted')||v.includes('interested'))&&!v.includes('not'); }).length;
  const nint= data.filter(r=>String(r['Winning Chances']||'').toLowerCase().includes('not inter')).length;

  // Auto-detect the revenue column from actual sheet headers
  // Resets cache so each compFS call uses freshest data headers
  _erCol = null;
  const erCol = getERCol(data);
  console.log('FS Revenue column detected:', erCol);

  const ter=data.reduce((s,r)=>s+getER(r,erCol),0);
  let nr=0,er=0;
  data.forEach(r=>{ const v=getER(r,erCol); if(v===0)return; const p=String(r[pc]||'').toLowerCase(); if(p.match(/exisit|exist/))er+=v; else nr+=v; });
  const bsp={};
  data.forEach(r=>{
    const sp=r['Sales Person Name']||r['Salesperson']||'Unknown';
    if(!bsp[sp])bsp[sp]={vis:0,nv:0,ev:0,fv:0,rev:0};
    bsp[sp].vis++; bsp[sp].rev+=getER(r,erCol);
    const p=String(r[pc]||'').toLowerCase();
    if(p.includes('new'))bsp[sp].nv++;
    if(p.match(/exisit|exist/))bsp[sp].ev++;
    if(p.includes('follow'))bsp[sp].fv++;
  });
  const bpd={};
  data.forEach(r=>{ const p=r['Product']||'Unknown'; bpd[p]=(bpd[p]||0)+1; });
  return{t,nv,ev,fv,int_,nint,ter,nr,er,bsp,bpd,erCol};
}

          +'<td style="color:var(--green);font-family:JetBrains Mono;">'+fmt(d.rev)+'</td>'
          +'</tr>').join('')}
      </tbody></table>
    </div>`;

  dc('c9');  chartInstances['c9'] =new Chart(document.getElementById('c9'),{type:'doughnut',data:{labels:['New (NBD)','Existing','Follow-up'],datasets:[{data:[f.nv,f.ev,f.fv],backgroundColor:['#22d3ee','#a78bfa','#fbbf24'],borderWidth:0,hoverOffset:8}]},options:{...cDef,scales:{},cutout:'65%'}});
  dc('c10'); chartInstances['c10']=new Chart(document.getElementById('c10'),{type:'bar',data:{labels:pd.map(e=>e[0]),datasets:[{data:pd.map(e=>e[1]),backgroundColor:'#22d3ee',borderRadius:4,barThickness:24}]},options:{...cDef,plugins:{...cDef.plugins,legend:{display:false}}}});
  const sn=sp.map(e=>e[0]);
  dc('c11'); chartInstances['c11']=new Chart(document.getElementById('c11'),{type:'bar',data:{labels:sn,datasets:[{label:'New',data:sn.map(n=>f.bsp[n].nv),backgroundColor:'#34d399',borderRadius:4},{label:'Existing',data:sn.map(n=>f.bsp[n].ev),backgroundColor:'#a78bfa',borderRadius:4},{label:'Follow-up',data:sn.map(n=>f.bsp[n].fv),backgroundColor:'#fbbf24',borderRadius:4}]},options:{...cDef,scales:{...cDef.scales,x:{...cDef.scales.x,stacked:true},y:{...cDef.scales.y,stacked:true}}}});
  const sr=sp.filter(e=>e[1].rev>0).sort((a,b)=>b[1].rev-a[1].rev);
  dc('c12'); chartInstances['c12']=new Chart(document.getElementById('c12'),{type:'bar',data:{labels:sr.map(e=>e[0]),datasets:[{data:sr.map(e=>e[1].rev),backgroundColor:'#fbbf24',borderRadius:4,barThickness:28}]},options:{...cDef,indexAxis:'y',plugins:{...cDef.plugins,legend:{display:false}}}});
}

// ============================================================
//  BOOT — auto-fetch + refresh every 5 mins
// ============================================================
document.addEventListener('DOMContentLoaded',()=>{ fetchAllData(); setInterval(fetchAllData,300000); });
</script>
