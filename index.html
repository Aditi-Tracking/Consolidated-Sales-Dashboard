<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AT &mdash; Sales Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#060910;
  --sf:#0b0f1a;
  --sf2:#101522;
  --sf3:#151c2e;
  --bd:#1c2840;
  --bd2:#243350;
  --t1:#f0f4ff;
  --t2:#8899bb;
  --t3:#3d5278;
  --c:#00d4ff;   --cd:rgba(0,212,255,.1);   --cs:rgba(0,212,255,.18);
  --g:#00e5a0;   --gd:rgba(0,229,160,.1);   --gs:rgba(0,229,160,.18);
  --r:#ff5572;   --rd:rgba(255,85,114,.1);
  --a:#ffb020;   --ad:rgba(255,176,32,.1);
  --p:#a78bfa;   --pd:rgba(167,139,250,.1);
  --b:#4da6ff;   --bd3:rgba(77,166,255,.1);
  --or:#ff7a45;  --ord:rgba(255,122,69,.1);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--t1);font-size:13px;line-height:1.5;overflow-x:hidden;min-height:100vh;}

/* subtle dot grid */
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:radial-gradient(circle,rgba(0,212,255,.06) 1px,transparent 1px);
  background-size:28px 28px;}

/* ── HEADER ── */
header{
  position:sticky;top:0;z-index:200;height:52px;
  background:rgba(6,9,16,.96);border-bottom:1px solid var(--bd);
  backdrop-filter:blur(24px);
  display:flex;align-items:center;padding:0 24px;gap:16px;
  position:relative;z-index:200;
}
header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--c),var(--p),transparent);opacity:.3;}
.logo{
  width:30px;height:30px;border-radius:7px;flex-shrink:0;
  background:linear-gradient(135deg,var(--c),var(--p));
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:11px;color:#fff;letter-spacing:.5px;
  box-shadow:0 0 16px rgba(0,212,255,.3);
}
.brand{font-size:13px;font-weight:600;letter-spacing:-.2px;color:var(--t1);}
.brand b{color:var(--c);}
.hdiv{width:1px;height:18px;background:var(--bd);flex-shrink:0;}
.hstatus{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--t3);}
.hts{font-size:10px;color:var(--t3);font-family:'JetBrains Mono';}
.hright{margin-left:auto;display:flex;align-items:center;gap:8px;}
.dpill{display:flex;align-items:center;gap:5px;background:var(--sf);border:1px solid var(--bd);border-radius:6px;padding:4px 10px;}
.dpill label{font-size:10px;color:var(--t3);font-weight:600;white-space:nowrap;text-transform:uppercase;letter-spacing:.4px;}
.dpill input{background:transparent;border:none;color:var(--t1);font-family:'Inter';font-size:11px;outline:none;width:92px;}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.5);cursor:pointer;width:12px;}
.hbtn{height:30px;padding:0 14px;border-radius:6px;border:none;cursor:pointer;font-family:'Inter';font-size:11px;font-weight:600;display:flex;align-items:center;gap:5px;transition:all .15s;white-space:nowrap;}
.hbtn-p{background:var(--c);color:#06090f;}
.hbtn-p:hover{filter:brightness(1.1);box-shadow:0 0 12px rgba(0,212,255,.4);}
.hbtn-o{background:var(--sf);color:var(--t2);border:1px solid var(--bd);}
.hbtn-o:hover{border-color:var(--bd2);color:var(--t1);}
.sdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.sdot.live{background:var(--g);box-shadow:0 0 6px var(--g);animation:blink 2s infinite;}
.sdot.loading{background:var(--a);animation:blink 1s infinite;}
.sdot.error{background:var(--r);}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}

/* ── LAYOUT ── */
main{padding:16px 24px;max-width:1720px;margin:0 auto;position:relative;z-index:1;}

/* ── TABS ── */
.tabs{display:flex;border-bottom:1px solid var(--bd);margin-bottom:16px;gap:0;}
.tab{padding:9px 20px;border:none;background:transparent;color:var(--t3);font-family:'Inter';font-size:12px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;letter-spacing:.1px;}
.tab:hover:not(.active){color:var(--t2);}
.tab.active{color:var(--c);border-bottom-color:var(--c);font-weight:600;}
.section{display:none;}
.section.active{display:block;animation:fi .2s ease;}
@keyframes fi{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

/* ── ERROR ── */
.ebanner{background:var(--rd);border:1px solid rgba(255,85,114,.25);border-radius:7px;padding:8px 14px;margin-bottom:14px;font-size:11px;color:var(--r);display:flex;align-items:center;gap:8px;}
.ebanner.hidden{display:none;}

/* ── KPI STRIP ── */
.kstrip{display:grid;gap:1px;background:var(--bd);border:1px solid var(--bd);border-radius:10px;overflow:hidden;margin-bottom:14px;}
.kc{background:var(--sf);padding:14px 18px;position:relative;transition:background .15s;}
.kc:hover{background:var(--sf2);}
.kc-lbl{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;}
.kc-val{font-family:'JetBrains Mono';font-size:26px;font-weight:600;color:var(--t1);line-height:1;letter-spacing:-1px;}
.kc-val.md{font-size:20px;letter-spacing:-.5px;}
.kc-val.sm{font-size:16px;letter-spacing:-.3px;}
.kc-sub{font-size:11px;color:var(--t3);margin-top:5px;line-height:1.4;}
.kc-sub em{color:var(--t2);font-style:normal;font-weight:500;}
.kc-foot{position:absolute;bottom:0;left:0;right:0;height:2px;}

/* ── SECTION LABEL ── */
.slbl{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px;display:flex;align-items:center;gap:10px;}
.slbl::after{content:'';flex:1;height:1px;background:var(--bd);}

/* ── PIPELINE ── */
.pipe-wrap{margin-bottom:14px;}
.pipe{display:grid;gap:1px;background:var(--bd);border:1px solid var(--bd);border-radius:10px;overflow:hidden;}
.ps{background:var(--sf);padding:13px 16px;position:relative;overflow:hidden;transition:background .15s;}
.ps:hover{background:var(--sf2);}
.ps-stage{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;}
.ps-num{font-family:'JetBrains Mono';font-size:28px;font-weight:600;line-height:1;letter-spacing:-1px;}
.ps-conv{font-size:10.5px;color:var(--t3);margin-top:4px;}
.ps-conv em{font-style:normal;color:var(--t2);}
.ps-bar{position:absolute;bottom:0;left:0;height:3px;border-radius:0;}
/* arrow divider between stages */
.ps::after{content:'';position:absolute;right:-1px;top:50%;transform:translateY(-50%);
  width:0;height:0;border-top:8px solid transparent;border-bottom:8px solid transparent;
  border-left:8px solid var(--bd);z-index:2;}
.ps:last-child::after{display:none;}

/* ── GRID LAYOUTS ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:14px;}
.g13{display:grid;grid-template-columns:1fr 2fr;gap:12px;margin-bottom:14px;}
.g31{display:grid;grid-template-columns:2fr 1fr;gap:12px;margin-bottom:14px;}

/* ── CARD ── */
.card{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:16px;}
.card-t{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:12px;}
.card-t.has-line{display:flex;align-items:center;gap:8px;}
.card-t.has-line::after{content:'';flex:1;height:1px;background:var(--bd);}

/* ── REVENUE PAIR ── */
.rpair{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:12px;}
.ri-lbl{font-size:10.5px;color:var(--t2);margin-bottom:4px;display:flex;align-items:center;gap:6px;}
.ri-dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0;}
.ri-lbl small{font-size:9px;opacity:.55;}
.ri-val{font-family:'JetBrains Mono';font-size:22px;font-weight:600;line-height:1;letter-spacing:-.5px;}
.ri-sub{font-size:10.5px;color:var(--t3);margin-top:3px;}

/* ── TEMP STATS ── */
.temp-row{display:flex;gap:0;background:var(--bd);border-radius:8px;overflow:hidden;margin-bottom:12px;}
.temp-cell{flex:1;background:var(--sf);padding:10px 14px;border-right:1px solid var(--bd);}
.temp-cell:last-child{border-right:none;}
.temp-lbl{font-size:9.5px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
.temp-val{font-family:'JetBrains Mono';font-size:24px;font-weight:600;line-height:1;letter-spacing:-.5px;}
.temp-pct{font-size:10.5px;color:var(--t3);margin-top:3px;}

/* ── TABLE ── */
.tcard{background:var(--sf);border:1px solid var(--bd);border-radius:10px;margin-bottom:14px;overflow:hidden;}
.tcard-hdr{padding:11px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;}
.tcard-t{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;}
.tcard-ct{font-size:10px;color:var(--t3);font-family:'JetBrains Mono';}
.tscroll{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
thead th{text-align:left;padding:8px 16px;font-weight:600;color:var(--t3);border-bottom:1px solid var(--bd);font-size:10px;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap;background:var(--sf2);}
tbody td{padding:9px 16px;border-bottom:1px solid rgba(28,40,64,.8);color:var(--t2);white-space:nowrap;font-size:12px;}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover td{background:var(--sf2);}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;letter-spacing:.1px;}
.bc{background:var(--cd);color:var(--c);}
.bg{background:var(--gd);color:var(--g);}
.br{background:var(--rd);color:var(--r);}
.ba{background:var(--ad);color:var(--a);}
.bp{background:var(--pd);color:var(--p);}
.bb{background:var(--bd3);color:var(--b);}

/* mini bar */
.mbar{display:flex;align-items:center;gap:8px;}
.mbar-tr{flex:1;height:4px;background:var(--bd2);border-radius:2px;overflow:hidden;min-width:50px;}
.mbar-fi{height:100%;border-radius:2px;}

/* chart */
.chart-wrap{position:relative;}

/* ── LOADING ── */
.lov{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px;gap:12px;}
.spin{width:32px;height:32px;border:2px solid var(--bd2);border-top-color:var(--c);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

@media(max-width:1200px){.g2,.g3,.g13,.g31{grid-template-columns:1fr;}}
@media(max-width:768px){
  header{height:auto;flex-wrap:wrap;padding:10px 14px;}
  main{padding:10px 12px;}
  .kstrip{grid-template-columns:repeat(2,1fr)!important;}
  .pipe{grid-template-columns:repeat(2,1fr)!important;}
}
</style>
</head>
<body>
<header>
  <div class="logo">AT</div>
  <span class="brand">Aditi Tracking &nbsp;&mdash;&nbsp; <b>Sales Dashboard</b></span>
  <div class="hdiv"></div>
  <span id="statusIndicator" class="hstatus"><span class="sdot loading"></span><span>Connecting</span></span>
  <span id="lastUpdated" class="hts"></span>
  <div class="hright">
    <div class="dpill"><label>From&nbsp;</label><input type="date" id="dateFrom"></div>
    <div class="dpill"><label>To&nbsp;</label><input type="date" id="dateTo"></div>
    <button class="hbtn hbtn-p" onclick="applyFilters()">Apply</button>
    <button class="hbtn hbtn-o" onclick="resetFilters()">Reset</button>
    <button class="hbtn hbtn-o" onclick="fetchAllData()">&#8635; Refresh</button>
  </div>
</header>
<main>
  <div class="ebanner hidden" id="errorBanner"><span>&#9888;</span><span id="errorText"></span></div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('overview',this)">Overview</button>
    <button class="tab" onclick="switchTab('inside',this)">Inside Sales</button>
    <button class="tab" onclick="switchTab('field',this)">Field Sales</button>
  </div>
  <div class="section active" id="sec-overview"><div id="overviewContent"><div class="lov"><div class="spin"></div><span style="font-size:12px;color:var(--t3)">Loading...</span></div></div></div>
  <div class="section" id="sec-inside"><div id="insideContent"><div class="lov"><div class="spin"></div><span style="font-size:12px;color:var(--t3)">Loading...</span></div></div></div>
  <div class="section" id="sec-field"><div id="fieldContent"><div class="lov"><div class="spin"></div><span style="font-size:12px;color:var(--t3)">Loading...</span></div></div></div>
</main>
<script>
// APIs
const INSIDE_SALES_API = "https://script.google.com/macros/s/AKfycbxsC_glUfbC5RJSs0BPFYQI5jbsM5p6VeIraKcl-cO8zC8VjVnLqFYQuumhRP69oEy2/exec";
const FIELD_SALES_API  = "https://script.google.com/macros/s/AKfycbyPgpnZ31W0qhSL3fVJOC0UbVadmwiZyaPcLpiGdYertNEkYIjNe6u5LVNEZIrSsF0u_Q/exec";

let insideData=[], fieldData=[], filteredInsideData=[], filteredFieldData=[], CH={};

const num  = function(v){ return Number(v)||0; };
const has  = function(v){ return v!==null && v!==undefined && v!==''; };
const isYes= function(v){ return v && String(v).trim().toLowerCase()==='yes'; };
const pct  = function(a,b){ return b>0 ? ((a/b)*100).toFixed(0)+'%' : 'N/A'; };
const INR  = '\u20b9';

function fmt(n){
  if(n>=10000000) return INR+(n/10000000).toFixed(2)+' Cr';
  if(n>=100000)   return INR+(n/100000).toFixed(1)+' L';
  if(n>=1000)     return INR+(n/1000).toFixed(1)+'K';
  return INR+n.toLocaleString('en-IN');
}

function parseDate(v){
  if(!v) return null;
  if(v instanceof Date) return isNaN(v)?null:v;
  var s=String(v).trim();
  var m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})/);
  if(m){ var y=parseInt(m[3]); if(y<100)y+=2000; var d=new Date(y,parseInt(m[2])-1,parseInt(m[1])); return isNaN(d)?null:d; }
  var d2=new Date(s); return isNaN(d2.getTime())?null:d2;
}

var EMAIL_FIELDS=['Email','email','Email ID','EmailID','Customer Email','Email Address','E-mail','EMail'];
function getEmail(r){
  for(var i=0;i<EMAIL_FIELDS.length;i++) if(r[EMAIL_FIELDS[i]]&&String(r[EMAIL_FIELDS[i]]).trim()) return String(r[EMAIL_FIELDS[i]]).trim().toLowerCase();
  return (r['Phone']||r['Mobile']||r['Customer Name']||'').toString().trim().toLowerCase();
}

var _erCol=null;
function getERCol(data){
  if(_erCol) return _erCol;
  if(!data||!data.length) return null;
  var keys=Object.keys(data[0]);
  var exact=['Expected Revenue (\u20b9)','Expected Revenue','ExpectedRevenue','Expected Revenue(Rs)','Expected Revenue (Rs)'];
  for(var i=0;i<exact.length;i++) if(keys.indexOf(exact[i])>-1){_erCol=exact[i];return _erCol;}
  var fuzzy=null;
  for(var j=0;j<keys.length;j++) if(keys[j].toLowerCase().indexOf('revenue')>-1){fuzzy=keys[j];break;}
  if(fuzzy){_erCol=fuzzy;return _erCol;}
  console.warn('FS: no revenue col found. Keys:',keys);
  return null;
}
function getER(r,col){
  if(!col) return 0;
  var raw=r[col];
  if(raw===null||raw===undefined||raw==='') return 0;
  var v=parseFloat(String(raw).replace(/[\u20b9,\s]/g,''));
  return isNaN(v)?0:v;
}
function dc(id){ if(CH[id]){CH[id].destroy();delete CH[id];} }

function setStatus(t,txt){ document.getElementById('statusIndicator').innerHTML='<span class="sdot '+t+'"></span><span>'+txt+'</span>'; }
function showError(m){ document.getElementById('errorBanner').classList.remove('hidden'); document.getElementById('errorText').textContent=m; }
function hideError(){ document.getElementById('errorBanner').classList.add('hidden'); }

async function fetchSheet(url){
  var res=await fetch(url,{redirect:'follow'});
  var text=await res.text();
  try{
    var j=JSON.parse(text);
    if(Array.isArray(j)) return j;
    if(j&&typeof j==='object') for(var k of Object.keys(j)) if(Array.isArray(j[k])) return j[k];
    return [];
  }catch(e){ console.error('Parse fail:',text.slice(0,300)); return []; }
}

async function fetchAllData(){
  setStatus('loading','Fetching...'); hideError();
  try{
    var [iR,fR]=await Promise.allSettled([fetchSheet(INSIDE_SALES_API),fetchSheet(FIELD_SALES_API)]);
    var iOk=false,fOk=false;
    if(iR.status==='fulfilled'&&Array.isArray(iR.value)){insideData=iR.value;iOk=insideData.length>0;}else insideData=[];
    if(fR.status==='fulfilled'&&Array.isArray(fR.value)){fieldData=fR.value;fOk=fieldData.length>0;}else fieldData=[];
    filteredInsideData=insideData.slice(); filteredFieldData=fieldData.slice();
    if(iOk&&fOk) setStatus('live','Live &mdash; '+(insideData.length+fieldData.length)+' records');
    else if(iOk||fOk){setStatus('live','Partial');showError('One source returned empty.');}
    else{setStatus('error','Error');showError('Both APIs failed. Check console (F12).');}
    document.getElementById('lastUpdated').textContent='Updated '+new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
    renderAll();
  }catch(e){setStatus('error','Error');showError('Network error: '+e.message);}
}

function applyFilters(){
  var fr=document.getElementById('dateFrom').value?new Date(document.getElementById('dateFrom').value):null;
  var to=document.getElementById('dateTo').value?new Date(document.getElementById('dateTo').value+'T23:59:59'):null;
  function fil(data,tsF){ return data.filter(function(r){ var d=parseDate(r[tsF]); if(!d)return true; if(fr&&d<fr)return false; if(to&&d>to)return false; return true; }); }
  filteredInsideData=fil(insideData,'Timestamp');
  var fd=fil(fieldData,'Timestamp'); filteredFieldData=fd.length?fd:fil(fieldData,'Date');
  renderAll();
}
function resetFilters(){
  document.getElementById('dateFrom').value=''; document.getElementById('dateTo').value='';
  filteredInsideData=insideData.slice(); filteredFieldData=fieldData.slice(); renderAll();
}
function switchTab(tab,el){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  document.querySelectorAll('.section').forEach(function(s){s.classList.remove('active');});
  el.classList.add('active'); document.getElementById('sec-'+tab).classList.add('active');
}

function compIS(data){
  var allIS=insideData.length>0?insideData:data;
  var firstContact={};
  allIS.forEach(function(r){ var em=getEmail(r); if(!em)return; var d=parseDate(r['Timestamp']); if(d&&(!firstContact[em]||d<firstContact[em]))firstContact[em]=d; });
  var t=data.length, seenNew=new Set(), newLeads=0;
  data.slice().sort(function(a,b){return (parseDate(a['Timestamp'])||0)-(parseDate(b['Timestamp'])||0);})
    .forEach(function(r){ var em=getEmail(r); if(!seenNew.has(em)){seenNew.add(em);newLeads++;} });
  var followUps=data.filter(function(r){return has(r['Follow-up 1 '])||has(r['Follow-up 1'])||has(r['Follow-up 2 '])||has(r['Follow-up 2'])||has(r['Follow-up 3']);}).length;
  var f1=data.filter(function(r){return has(r['Follow-up 1 '])||has(r['Follow-up 1']);}).length;
  var f2=data.filter(function(r){return has(r['Follow-up 2 '])||has(r['Follow-up 2']);}).length;
  var f3=data.filter(function(r){return has(r['Follow-up 3']);}).length;
  var dg=data.filter(function(r){return isYes(r['Is the Demo Given']);}).length;
  var qs=data.filter(function(r){return isYes(r['Quotation Sent']);}).length;
  var wonRows=data.filter(function(r){return isYes(r['Won']);});
  var w=wonRows.length;
  var l=data.filter(function(r){return has(r['Lost'])&&!isYes(r['Won']);}).length;
  var junk=data.filter(function(r){return String(r['Lead Quality']||'').toLowerCase()==='junk'||String(r['Remarks']||'').toLowerCase().indexOf('junk')>-1;}).length;
  var wr=qs>0?((w/qs)*100).toFixed(1):0;
  var totalRev=0,nbdRev=0,exRev=0,nbdWon=0,exWon=0;
  wonRows.forEach(function(r){ var val=num(r['Order Value']); totalRev+=val; var em=getEmail(r),fc=firstContact[em],wonD=parseDate(r['Timestamp']); var days=(fc&&wonD)?(wonD-fc)/86400000:0; if(days<=60){nbdRev+=val;nbdWon++;}else{exRev+=val;exWon++;} });
  var avg=w>0?totalRev/w:0;
  var hot=data.filter(function(r){return String(r['LeadType']||r['Lead Type']||'').toLowerCase()==='hot';}).length;
  var warm=data.filter(function(r){return String(r['LeadType']||r['Lead Type']||'').toLowerCase()==='warm';}).length;
  var cold=data.filter(function(r){return String(r['LeadType']||r['Lead Type']||'').toLowerCase()==='cold';}).length;
  var src={},sol={},rbs={};
  data.forEach(function(r){ var s=r['Source']||'Unknown'; src[s]=(src[s]||0)+1; });
  data.forEach(function(r){ var s=r['Solution']||'Unknown'; sol[s]=(sol[s]||0)+1; });
  wonRows.forEach(function(r){ var s=r['Source']||'Unknown'; rbs[s]=(rbs[s]||0)+num(r['Order Value']); });
  // Monthly closures for trend
  var monthly={};
  wonRows.forEach(function(r){ var d=parseDate(r['Timestamp']); if(d){ var k=d.getFullYear()+'-'+(d.getMonth()+1); monthly[k]=(monthly[k]||0)+1; } });
  return {t,newLeads,followUps,f1,f2,f3,dg,qs,w,l,junk,wr,totalRev,nbdRev,exRev,nbdWon,exWon,avg,hot,warm,cold,src,sol,rbs,wonRows,firstContact,monthly};
}

function compFS(data){
  var t=data.length, pc='Purpose of Visit';
  _erCol=null;
  var erCol=getERCol(data);
  var nv=data.filter(function(r){return String(r[pc]||'').toLowerCase().indexOf('new')>-1;}).length;
  var ev=data.filter(function(r){ var v=String(r[pc]||'').toLowerCase(); return v.indexOf('exisit')>-1||v.indexOf('exist')>-1; }).length;
  var fv=data.filter(function(r){return String(r[pc]||'').toLowerCase().indexOf('follow')>-1;}).length;
  var int_=data.filter(function(r){ var v=String(r['Winning Chances']||'').toLowerCase(); return (v.indexOf('intersted')>-1||v.indexOf('interested')>-1)&&v.indexOf('not')===-1; }).length;
  var nint=data.filter(function(r){return String(r['Winning Chances']||'').toLowerCase().indexOf('not inter')>-1;}).length;
  var ter=data.reduce(function(s,r){return s+getER(r,erCol);},0);
  var nr=0,er=0;
  data.forEach(function(r){ var v=getER(r,erCol); if(!v)return; var p=String(r[pc]||'').toLowerCase(); if(p.match(/exisit|exist/))er+=v;else nr+=v; });
  var bsp={};
  data.forEach(function(r){
    var sp=r['Sales Person Name']||r['Salesperson']||'Unknown';
    if(!bsp[sp])bsp[sp]={vis:0,nv:0,ev:0,fv:0,rev:0};
    bsp[sp].vis++;bsp[sp].rev+=getER(r,erCol);
    var p=String(r[pc]||'').toLowerCase();
    if(p.indexOf('new')>-1)bsp[sp].nv++;
    if(p.match(/exisit|exist/))bsp[sp].ev++;
    if(p.indexOf('follow')>-1)bsp[sp].fv++;
  });
  var bpd={};
  data.forEach(function(r){ var p=r['Product']||'Unknown'; bpd[p]=(bpd[p]||0)+1; });
  // Monthly visits
  var monthly={};
  data.forEach(function(r){ var d=parseDate(r['Timestamp']||r['Date']); if(d){ var k=d.getFullYear()+'-'+(d.getMonth()+1); monthly[k]=(monthly[k]||0)+1; } });
  return {t,nv,ev,fv,int_,nint,ter,nr,er,bsp,bpd,monthly};
}

// Chart config
var COLORS=['#00d4ff','#a78bfa','#ffb020','#ff5572','#00e5a0','#4da6ff','#ff7a45','#e879f9'];
var CD={
  responsive:true,maintainAspectRatio:false,
  plugins:{
    legend:{labels:{color:'#3d5278',font:{family:'Inter',size:11},padding:12,usePointStyle:true,pointStyleWidth:7}},
    tooltip:{backgroundColor:'#0b0f1a',titleColor:'#f0f4ff',bodyColor:'#8899bb',borderColor:'#1c2840',borderWidth:1,padding:10,cornerRadius:8,titleFont:{family:'Inter',weight:'600',size:12},bodyFont:{family:'Inter',size:11},displayColors:true,boxWidth:8,boxHeight:8}

function noScales(extra){ return Object.assign({},CD,{scales:{}},extra||{}); }
function noLegend(){ return {display:false}; }

function mkPipe(steps){
  var cols=steps.length;
  var html='<div class="pipe" style="grid-template-columns:repeat('+cols+',1fr)">';
  steps.forEach(function(s){
    var w=s.base>0?Math.min(100,(s.val/s.base)*100):0;
    var convTxt=s.isBase?'base':'<em>'+((s.val/s.base)*100).toFixed(0)+'%</em> conv rate';
    html+='<div class="ps">'
      +'<div class="ps-stage">'+s.lbl+'</div>'
      +'<div class="ps-num" style="color:'+s.col+'">'+s.val+'</div>'
      +'<div class="ps-conv">'+convTxt+'</div>'
      +'<div class="ps-bar" style="background:'+s.col+';width:'+w+'%"></div>'
      +'</div>';
  });
  html+='</div>';
  return html;
}

// Sort months and return last N
function lastNMonths(obj,n){
  var keys=Object.keys(obj).sort();
  if(keys.length>n) keys=keys.slice(keys.length-n);
  return {labels:keys.map(function(k){ var p=k.split('-'); var mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']; return mo[parseInt(p[1])-1]+' '+p[0].slice(2); }),data:keys.map(function(k){return obj[k];})};
}
