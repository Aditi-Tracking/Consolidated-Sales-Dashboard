<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AT &mdash; Sales Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#07090f;
  --sf:#0c1018;
  --sf2:#111620;
  --bd:#192033;
  --bd2:#1f2d42;
  --t1:#dce6f5;
  --t2:#6b829e;
  --t3:#354a63;
  --c:#22d3ee;  --cd:rgba(34,211,238,.09);
  --g:#2dd4a0;  --gd:rgba(45,212,160,.09);
  --r:#f06878;  --rd:rgba(240,104,120,.09);
  --a:#e8a838;  --ad:rgba(232,168,56,.09);
  --p:#9b7fe8;  --pd:rgba(155,127,232,.09);
  --b:#4d9de0;  --bld:rgba(77,157,224,.09);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--t1);font-size:12px;line-height:1.5;overflow-x:hidden;}

/* ── HEADER ── */
header{
  position:sticky;top:0;z-index:100;
  height:44px;background:rgba(7,9,15,.97);
  border-bottom:1px solid var(--bd);
  backdrop-filter:blur(20px);
  display:flex;align-items:center;padding:0 20px;gap:14px;
}
.logo{
  width:24px;height:24px;border-radius:5px;flex-shrink:0;
  background:linear-gradient(135deg,var(--c),#7c6fef);
  display:flex;align-items:center;justify-content:center;
  font-weight:600;font-size:10px;color:#fff;
}
.brand{font-size:12px;font-weight:600;letter-spacing:-.1px;}
.brand b{color:var(--c);}
.h-div{width:1px;height:16px;background:var(--bd);flex-shrink:0;}
.h-status{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--t3);}
.ts{font-size:10px;color:var(--t3);font-family:'IBM Plex Mono';}
.h-right{margin-left:auto;display:flex;align-items:center;gap:7px;}
.dpill{display:flex;align-items:center;gap:4px;background:var(--sf);border:1px solid var(--bd);border-radius:5px;padding:3px 8px;}
.dpill label{font-size:10px;color:var(--t3);font-weight:500;white-space:nowrap;}
.dpill input{background:transparent;border:none;color:var(--t1);font-family:'IBM Plex Sans';font-size:11px;outline:none;width:88px;}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.5);cursor:pointer;width:11px;}
.hbtn{height:26px;padding:0 10px;border-radius:5px;border:none;cursor:pointer;font-family:'IBM Plex Sans';font-size:11px;font-weight:500;display:flex;align-items:center;gap:4px;transition:.15s;}
.hbtn-p{background:var(--c);color:#07090f;font-weight:600;}
.hbtn-p:hover{filter:brightness(1.12);}
.hbtn-o{background:transparent;color:var(--t2);border:1px solid var(--bd);}
.hbtn-o:hover{border-color:var(--bd2);color:var(--t1);}
.sdot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.sdot.live{background:var(--g);box-shadow:0 0 5px var(--g);animation:blink 2s infinite;}
.sdot.loading{background:var(--a);animation:blink 1s infinite;}
.sdot.error{background:var(--r);}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.25;}}

/* ── MAIN ── */
main{padding:14px 20px;max-width:1700px;margin:0 auto;}

/* ── TABS ── */
.tabs{display:flex;border-bottom:1px solid var(--bd);margin-bottom:14px;}
.tab{padding:7px 16px;border:none;background:transparent;color:var(--t3);font-family:'IBM Plex Sans';font-size:11px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:.15s;letter-spacing:.1px;}
.tab:hover:not(.active){color:var(--t2);}
.tab.active{color:var(--c);border-bottom-color:var(--c);font-weight:600;}
.section{display:none;}
.section.active{display:block;animation:fi .18s ease;}
@keyframes fi{from{opacity:0;transform:translateY(3px);}to{opacity:1;transform:translateY(0);}}

/* ── ERROR ── */
.ebanner{background:var(--rd);border:1px solid rgba(240,104,120,.2);border-radius:6px;padding:7px 12px;margin-bottom:12px;font-size:11px;color:var(--r);display:flex;align-items:center;gap:7px;}
.ebanner.hidden{display:none;}

/* ── KPI ROW ── */
.krow{display:grid;gap:1px;background:var(--bd);border:1px solid var(--bd);border-radius:8px;overflow:hidden;margin-bottom:12px;}
.kc{background:var(--sf);padding:11px 14px;position:relative;transition:background .15s;cursor:default;}
.kc:hover{background:var(--sf2);}
.kc-lbl{font-size:9.5px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
.kc-val{font-family:'IBM Plex Mono';font-size:20px;font-weight:500;letter-spacing:-.5px;color:var(--t1);line-height:1.1;}
.kc-val.sm{font-size:15px;}
.kc-sub{font-size:10px;color:var(--t3);margin-top:2px;}
.kc-sub em{color:var(--t2);font-style:normal;}
.kc-bar{position:absolute;bottom:0;left:0;right:0;height:2px;}

/* ── PIPELINE ── */
.pipe-wrap{margin-bottom:12px;}
.sec-lbl{font-size:9.5px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px;display:flex;align-items:center;gap:8px;}
.sec-lbl::after{content:'';flex:1;height:1px;background:var(--bd);}
.pipe{display:grid;gap:1px;background:var(--bd);border:1px solid var(--bd);border-radius:8px;overflow:hidden;}
.ps{background:var(--sf);padding:10px 12px;position:relative;overflow:hidden;transition:background .15s;}
.ps:hover{background:var(--sf2);}
.ps-lbl{font-size:9px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px;}
.ps-num{font-family:'IBM Plex Mono';font-size:20px;font-weight:500;line-height:1;letter-spacing:-.5px;}
.ps-pct{font-size:9.5px;color:var(--t3);margin-top:2px;}
.ps-foot{height:2px;position:absolute;bottom:0;left:0;transition:width .5s ease;}

/* ── 2-COL GRID ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px;}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:8px;padding:13px 14px;}
.card-t{font-size:9.5px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;}

/* revenue pair inside card */
.rpair{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.ri-lbl{font-size:10px;color:var(--t3);margin-bottom:3px;display:flex;align-items:center;gap:5px;}
.ri-dot{width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0;}
.ri-val{font-family:'IBM Plex Mono';font-size:17px;font-weight:500;letter-spacing:-.3px;line-height:1.1;}
.ri-sub{font-size:10px;color:var(--t3);margin-top:2px;}

/* temp inline stats */
.temp-row{display:flex;gap:20px;margin-bottom:12px;}
.temp-item .ti-l{font-size:9.5px;color:var(--t3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px;}
.temp-item .ti-v{font-family:'IBM Plex Mono';font-size:19px;font-weight:500;line-height:1;}
.temp-item .ti-p{font-size:10px;color:var(--t3);margin-top:1px;}

/* ── TABLE ── */
.tcard{background:var(--sf);border:1px solid var(--bd);border-radius:8px;margin-bottom:12px;overflow:hidden;}
.tcard-hdr{padding:9px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;}
.tcard-t{font-size:9.5px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;}
.tcard-ct{font-size:10px;color:var(--t3);font-family:'IBM Plex Mono';}
.tscroll{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
thead th{text-align:left;padding:6px 14px;font-weight:600;color:var(--t3);border-bottom:1px solid var(--bd);font-size:9.5px;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap;}
tbody td{padding:7px 14px;border-bottom:1px solid rgba(25,32,51,.7);color:var(--t2);white-space:nowrap;font-size:11.5px;}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover td{background:var(--sf2);}
.badge{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:600;letter-spacing:.1px;}
.bc{background:var(--cd);color:var(--c);}
.bg{background:var(--gd);color:var(--g);}
.br{background:var(--rd);color:var(--r);}
.ba{background:var(--ad);color:var(--a);}
.bp{background:var(--pd);color:var(--p);}
.bb{background:var(--bld);color:var(--b);}

/* mini progress bar in table */
.mbar{display:flex;align-items:center;gap:6px;}
.mbar-tr{flex:1;height:3px;background:var(--bd2);border-radius:2px;overflow:hidden;min-width:60px;}
.mbar-fi{height:100%;border-radius:2px;}

/* ── LOADING ── */
.lov{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px;gap:10px;}
.spin{width:28px;height:28px;border:2px solid var(--bd2);border-top-color:var(--c);border-radius:50%;animation:spin .65s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── CHART ── */
.chart-wrap{position:relative;}

@media(max-width:1100px){.g2,.g3{grid-template-columns:1fr;}}
@media(max-width:768px){
  header{height:auto;flex-wrap:wrap;padding:8px 14px;}
  main{padding:10px 12px;}
  .krow{grid-template-columns:repeat(2,1fr)!important;}
  .pipe{grid-template-columns:repeat(2,1fr)!important;}
}
</style>
</head>
<body>
<header>
  <div class="logo">AT</div>
  <span class="brand">Aditi Tracking &nbsp;&mdash;&nbsp; <b>Sales Dashboard</b></span>
  <div class="h-div"></div>
  <span id="statusIndicator" class="h-status"><span class="sdot loading"></span><span>Connecting</span></span>
  <span id="lastUpdated" class="ts"></span>
  <div class="h-right">
    <div class="dpill"><label>From&nbsp;</label><input type="date" id="dateFrom"></div>
    <div class="dpill"><label>To&nbsp;</label><input type="date" id="dateTo"></div>
    <button class="hbtn hbtn-p" onclick="applyFilters()">Apply</button>
    <button class="hbtn hbtn-o" onclick="resetFilters()">Reset</button>
    <button class="hbtn hbtn-o" onclick="fetchAllData()">&#8635; Refresh</button>
  </div>
</header>
<main>
  <div class="ebanner hidden" id="errorBanner"><span>&#9888;</span><span id="errorText"></span></div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('overview',this)">Overview</button>
    <button class="tab" onclick="switchTab('inside',this)">Inside Sales</button>
    <button class="tab" onclick="switchTab('field',this)">Field Sales</button>
  </div>
  <div class="section active" id="sec-overview"><div id="overviewContent"><div class="lov"><div class="spin"></div><span style="font-size:11px;color:var(--t3)">Loading...</span></div></div></div>
  <div class="section" id="sec-inside"><div id="insideContent"><div class="lov"><div class="spin"></div><span style="font-size:11px;color:var(--t3)">Loading...</span></div></div></div>
  <div class="section" id="sec-field"><div id="fieldContent"><div class="lov"><div class="spin"></div><span style="font-size:11px;color:var(--t3)">Loading...</span></div></div></div>
</main>
<script>
// ─── APIs ────────────────────────────────────────────────────────────────────
const INSIDE_SALES_API = "https://script.google.com/macros/s/AKfycbxsC_glUfbC5RJSs0BPFYQI5jbsM5p6VeIraKcl-cO8zC8VjVnLqFYQuumhRP69oEy2/exec";
const FIELD_SALES_API  = "https://script.google.com/macros/s/AKfycbyPgpnZ31W0qhSL3fVJOC0UbVadmwiZyaPcLpiGdYertNEkYIjNe6u5LVNEZIrSsF0u_Q/exec";

// ─── State ───────────────────────────────────────────────────────────────────
let insideData=[], fieldData=[], filteredInsideData=[], filteredFieldData=[], CH={};

// ─── Helpers ─────────────────────────────────────────────────────────────────
const num  = v => Number(v)||0;
const has  = v => v!==null && v!==undefined && v!=='';
const isYes= v => v && String(v).trim().toLowerCase()==='yes';
const pct  = (a,b) => b>0 ? ((a/b)*100).toFixed(0)+'%' : 'N/A';
const INR  = '\u20b9';

function fmt(n){
  if(n>=10000000) return INR+(n/10000000).toFixed(2)+' Cr';
  if(n>=100000)   return INR+(n/100000).toFixed(1)+' L';
  if(n>=1000)     return INR+(n/1000).toFixed(1)+'K';
  return INR+n.toLocaleString('en-IN');
}

function parseDate(v){
  if(!v) return null;
  if(v instanceof Date) return isNaN(v)?null:v;
  const s=String(v).trim();
  const m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})/);
  if(m){ let y=parseInt(m[3]); if(y<100)y+=2000; const d=new Date(y,parseInt(m[2])-1,parseInt(m[1])); return isNaN(d)?null:d; }
  const d=new Date(s); return isNaN(d.getTime())?null:d;
}

const EMAIL_FIELDS=['Email','email','Email ID','EmailID','Customer Email','Email Address','E-mail','EMail'];
function getEmail(r){
  for(const f of EMAIL_FIELDS) if(r[f]&&String(r[f]).trim()) return String(r[f]).trim().toLowerCase();
  return (r['Phone']||r['Mobile']||r['Customer Name']||'').toString().trim().toLowerCase();
}

let _erCol=null;
function getERCol(data){
  if(_erCol) return _erCol;
  if(!data||!data.length) return null;
  const keys=Object.keys(data[0]);
  const exact=['Expected Revenue (\u20b9)','Expected Revenue','ExpectedRevenue','Expected Revenue(Rs)','Expected Revenue (Rs)'];
  for(const e of exact) if(keys.includes(e)){_erCol=e;return _erCol;}
  const fuzzy=keys.find(k=>k.toLowerCase().includes('revenue'));
  if(fuzzy){_erCol=fuzzy;return _erCol;}
  console.warn('FS: no revenue col. Keys:',keys);
  return null;
}
function getER(r,col){
  if(!col) return 0;
  const raw=r[col];
  if(raw===null||raw===undefined||raw==='') return 0;
  const v=parseFloat(String(raw).replace(/[\u20b9,\s]/g,''));
  return isNaN(v)?0:v;
}

function dc(id){ if(CH[id]){CH[id].destroy();delete CH[id];} }

// ─── Status ──────────────────────────────────────────────────────────────────
function setStatus(t,txt){
  document.getElementById('statusIndicator').innerHTML=
    '<span class="sdot '+t+'"></span><span>'+txt+'</span>';
}
function showError(m){ document.getElementById('errorBanner').classList.remove('hidden'); document.getElementById('errorText').textContent=m; }
function hideError(){ document.getElementById('errorBanner').classList.add('hidden'); }

// ─── Fetch ───────────────────────────────────────────────────────────────────
async function fetchSheet(url){
  const res=await fetch(url,{redirect:'follow'});
  const text=await res.text();
  try{
    const j=JSON.parse(text);
    if(Array.isArray(j)) return j;
    if(j&&typeof j==='object') for(const k of Object.keys(j)) if(Array.isArray(j[k])) return j[k];
    return [];
  }catch(e){ console.error('Parse fail:',text.slice(0,300)); return []; }
}

async function fetchAllData(){
  setStatus('loading','Fetching...'); hideError();
  try{
    const[iR,fR]=await Promise.allSettled([fetchSheet(INSIDE_SALES_API),fetchSheet(FIELD_SALES_API)]);
    let iOk=false,fOk=false;
    if(iR.status==='fulfilled'&&Array.isArray(iR.value)){insideData=iR.value;iOk=insideData.length>0;}else insideData=[];
    if(fR.status==='fulfilled'&&Array.isArray(fR.value)){fieldData=fR.value;fOk=fieldData.length>0;}else fieldData=[];
    filteredInsideData=insideData.slice(); filteredFieldData=fieldData.slice();
    if(iOk&&fOk) setStatus('live','Live &mdash; '+(insideData.length+fieldData.length)+' records');
    else if(iOk||fOk){setStatus('live','Partial &mdash; '+(insideData.length+fieldData.length)+' records');showError('One source returned empty.');}
    else{setStatus('error','Error');showError('Both APIs failed. Check console (F12).');}
    document.getElementById('lastUpdated').textContent='Updated '+new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
    renderAll();
  }catch(e){setStatus('error','Error');showError('Network error: '+e.message);}
}

// ─── Filters ─────────────────────────────────────────────────────────────────
function applyFilters(){
  const fr=document.getElementById('dateFrom').value?new Date(document.getElementById('dateFrom').value):null;
  const to=document.getElementById('dateTo').value?new Date(document.getElementById('dateTo').value+'T23:59:59'):null;
  const fil=(data,tsF)=>data.filter(r=>{const d=parseDate(r[tsF]);if(!d)return true;if(fr&&d<fr)return false;if(to&&d>to)return false;return true;});
  filteredInsideData=fil(insideData,'Timestamp');
  filteredFieldData=fil(fieldData,'Timestamp').length?fil(fieldData,'Timestamp'):fil(fieldData,'Date');
  renderAll();
}
function resetFilters(){
  document.getElementById('dateFrom').value=''; document.getElementById('dateTo').value='';
  filteredInsideData=insideData.slice(); filteredFieldData=fieldData.slice(); renderAll();
}
function switchTab(tab,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  el.classList.add('active'); document.getElementById('sec-'+tab).classList.add('active');
}

// ─── Compute Inside Sales ────────────────────────────────────────────────────
function compIS(data){
  const allIS=insideData.length>0?insideData:data;
  const firstContact={};
  allIS.forEach(r=>{
    const em=getEmail(r); if(!em)return;
    const d=parseDate(r['Timestamp']);
    if(d&&(!firstContact[em]||d<firstContact[em]))firstContact[em]=d;
  });
  const t=data.length;
  const seenNew=new Set();
  let newLeads=0;
  [...data].sort((a,b)=>(parseDate(a['Timestamp'])||0)-(parseDate(b['Timestamp'])||0))
    .forEach(r=>{const em=getEmail(r);if(!seenNew.has(em)){seenNew.add(em);newLeads++;}});
  const followUps=data.filter(r=>has(r['Follow-up 1 '])||has(r['Follow-up 1'])||has(r['Follow-up 2 '])||has(r['Follow-up 2'])||has(r['Follow-up 3'])).length;
  const f1=data.filter(r=>has(r['Follow-up 1 '])||has(r['Follow-up 1'])).length;
  const f2=data.filter(r=>has(r['Follow-up 2 '])||has(r['Follow-up 2'])).length;
  const f3=data.filter(r=>has(r['Follow-up 3'])).length;
  const dg=data.filter(r=>isYes(r['Is the Demo Given'])).length;
  const qs=data.filter(r=>isYes(r['Quotation Sent'])).length;
  const wonRows=data.filter(r=>isYes(r['Won']));
  const w=wonRows.length;
  const l=data.filter(r=>has(r['Lost'])&&!isYes(r['Won'])).length;
  const junk=data.filter(r=>String(r['Lead Quality']||'').toLowerCase()==='junk'||String(r['Remarks']||'').toLowerCase().includes('junk')).length;
  const wr=qs>0?((w/qs)*100).toFixed(1):0;
  let totalRev=0,nbdRev=0,exRev=0,nbdWon=0,exWon=0;
  wonRows.forEach(r=>{
    const val=num(r['Order Value']); totalRev+=val;
    const em=getEmail(r),fc=firstContact[em],wonD=parseDate(r['Timestamp']);
    const days=(fc&&wonD)?(wonD-fc)/86400000:0;
    if(days<=60){nbdRev+=val;nbdWon++;}else{exRev+=val;exWon++;}
  });
  const avg=w>0?totalRev/w:0;
  const hot =data.filter(r=>String(r['LeadType']||r['Lead Type']||'').toLowerCase()==='hot').length;
  const warm=data.filter(r=>String(r['LeadType']||r['Lead Type']||'').toLowerCase()==='warm').length;
  const cold=data.filter(r=>String(r['LeadType']||r['Lead Type']||'').toLowerCase()==='cold').length;
  const src={},sol={},rbs={};
  data.forEach(r=>{const s=r['Source']||'Unknown';src[s]=(src[s]||0)+1;});
  data.forEach(r=>{const s=r['Solution']||'Unknown';sol[s]=(sol[s]||0)+1;});
  wonRows.forEach(r=>{const s=r['Source']||'Unknown';rbs[s]=(rbs[s]||0)+num(r['Order Value']);});
  return{t,newLeads,followUps,f1,f2,f3,dg,qs,w,l,junk,wr,totalRev,nbdRev,exRev,nbdWon,exWon,avg,hot,warm,cold,src,sol,rbs,wonRows,firstContact};
}

// ─── Compute Field Sales ─────────────────────────────────────────────────────
function compFS(data){
  const t=data.length, pc='Purpose of Visit';
  _erCol=null;
  const erCol=getERCol(data);
  const nv=data.filter(r=>String(r[pc]||'').toLowerCase().includes('new')).length;
  const ev=data.filter(r=>{const v=String(r[pc]||'').toLowerCase();return v.includes('exisit')||v.includes('exist');}).length;
  const fv=data.filter(r=>String(r[pc]||'').toLowerCase().includes('follow')).length;
  const int_=data.filter(r=>{const v=String(r['Winning Chances']||'').toLowerCase();return(v.includes('intersted')||v.includes('interested'))&&!v.includes('not');}).length;
  const nint=data.filter(r=>String(r['Winning Chances']||'').toLowerCase().includes('not inter')).length;
  const ter=data.reduce((s,r)=>s+getER(r,erCol),0);
  let nr=0,er=0;
  data.forEach(r=>{const v=getER(r,erCol);if(!v)return;const p=String(r[pc]||'').toLowerCase();if(p.match(/exisit|exist/))er+=v;else nr+=v;});
  const bsp={};
  data.forEach(r=>{
    const sp=r['Sales Person Name']||r['Salesperson']||'Unknown';
    if(!bsp[sp])bsp[sp]={vis:0,nv:0,ev:0,fv:0,rev:0};
    bsp[sp].vis++;bsp[sp].rev+=getER(r,erCol);
    const p=String(r[pc]||'').toLowerCase();
    if(p.includes('new'))bsp[sp].nv++;
    if(p.match(/exisit|exist/))bsp[sp].ev++;
    if(p.includes('follow'))bsp[sp].fv++;
  });
  const bpd={};
  data.forEach(r=>{const p=r['Product']||'Unknown';bpd[p]=(bpd[p]||0)+1;});
  return{t,nv,ev,fv,int_,nint,ter,nr,er,bsp,bpd};
}

// ─── Chart defaults ───────────────────────────────────────────────────────────
const CD={
  responsive:true,maintainAspectRatio:false,
  plugins:{
    legend:{labels:{color:'#354a63',font:{family:'IBM Plex Sans',size:10},padding:10,usePointStyle:true,pointStyleWidth:6}},
    tooltip:{backgroundColor:'#0c1018',titleColor:'#dce6f5',bodyColor:'#6b829e',borderColor:'#192033',borderWidth:1,padding:9,cornerRadius:6,titleFont:{family:'IBM Plex Sans',weight:'600',size:11},bodyFont:{family:'IBM Plex Sans',size:10}}
  },
  scales:{
    x:{ticks:{color:'#354a63',font:{family:'IBM Plex Sans',size:10}},grid:{color:'rgba(25,32,51,.5)'},border:{color:'transparent'}},

// ─── Pipeline builder ────────────────────────────────────────────────────────
function mkPipe(steps){
  const cols=steps.length;
  return '<div class="pipe" style="grid-template-columns:repeat('+cols+',1fr)">'
    +steps.map(function(s){
      var w=s.base>0?Math.min(100,(s.val/s.base)*100):0;
      return '<div class="ps">'
        +'<div class="ps-lbl">'+s.lbl+'</div>'
        +'<div class="ps-num" style="color:'+s.col+'">'+s.val+'</div>'
        +'<div class="ps-pct">'+(s.base>0?((s.val/s.base)*100).toFixed(0)+'% conv':'base')+'</div>'
        +'<div class="ps-foot" style="background:'+s.col+';width:'+w+'%"></div>'
        +'</div>';
    }).join('')
    +'</div>';
}
