<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aditi Tracking — Sales KPI Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg: #080c14;
  --bg-card: #0d1420;
  --bg-hover: #121a2b;
  --bg-input: #111827;
  --border: #1a2540;
  --border-l: #243050;
  --txt: #e2e8f4;
  --txt2: #7d93b4;
  --txt3: #3d5070;
  --cyan: #22d3ee; --cyan-d: rgba(34,211,238,0.1);
  --green: #34d399; --green-d: rgba(52,211,153,0.1);
  --red: #f87171; --red-d: rgba(248,113,113,0.1);
  --amber: #fbbf24; --amber-d: rgba(251,191,36,0.1);
  --purple: #a78bfa; --purple-d: rgba(167,139,250,0.1);
  --blue: #60a5fa; --blue-d: rgba(96,165,250,0.1);
  --orange: #fb923c; --orange-d: rgba(251,146,60,0.1);
  --r: 10px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{font-size:13px;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden;}

/* subtle grid bg */
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(34,211,238,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(34,211,238,0.025) 1px,transparent 1px);
  background-size:40px 40px;mask-image:radial-gradient(ellipse 100% 50% at 50% 0%,black,transparent);}

/* HEADER */
.hdr{
  position:sticky;top:0;z-index:200;height:48px;
  background:rgba(8,12,20,0.95);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;gap:12px;
}
.hdr-l{display:flex;align-items:center;gap:10px;}
.logo{
  width:28px;height:28px;border-radius:7px;flex-shrink:0;
  background:linear-gradient(135deg,var(--cyan),#6366f1);
  display:flex;align-items:center;justify-content:center;
  font-weight:700;font-size:11px;color:#fff;letter-spacing:0;
}
.brand{font-weight:700;font-size:13px;letter-spacing:-0.2px;}
.brand em{color:var(--cyan);font-style:normal;}
.hdr-r{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.dpill{
  display:flex;align-items:center;gap:5px;
  background:var(--bg-input);border:1px solid var(--border);
  border-radius:6px;padding:4px 8px;
}
.dpill label{font-size:10px;color:var(--txt3);font-weight:600;text-transform:uppercase;letter-spacing:0.4px;white-space:nowrap;}
.dpill input{background:transparent;border:none;color:var(--txt);font-family:'Inter';font-size:11px;outline:none;width:96px;}
input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(0.6);cursor:pointer;width:12px;}
.btn{height:28px;padding:0 12px;border-radius:6px;border:none;cursor:pointer;
  font-family:'Inter';font-size:11px;font-weight:600;
  display:flex;align-items:center;gap:4px;transition:all 0.18s;white-space:nowrap;}
.btn-p{background:var(--cyan);color:#080c14;}
.btn-p:hover{background:#67e8f9;}
.btn-o{background:transparent;color:var(--txt2);border:1px solid var(--border);}
.btn-o:hover{color:var(--txt);border-color:var(--border-l);}
.sdot{width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0;}
.sdot.live{background:var(--green);box-shadow:0 0 6px var(--green);animation:blink 2s infinite;}
.sdot.error{background:var(--red);}
.sdot.loading{background:var(--amber);animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}
.srow{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--txt3);}
.ts{font-size:10px;color:var(--txt3);font-family:'JetBrains Mono';}

/* MAIN */
.main{padding:14px 20px;max-width:1700px;margin:0 auto;position:relative;z-index:1;}

/* TABS */
.tabs{display:flex;gap:2px;margin-bottom:14px;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:3px;width:fit-content;}
.tab{padding:5px 18px;border-radius:6px;border:none;cursor:pointer;
  font-family:'Inter';font-size:11px;font-weight:600;
  background:transparent;color:var(--txt3);transition:all 0.18s;}
.tab.active{background:var(--cyan-d);color:var(--cyan);box-shadow:inset 0 0 0 1px rgba(34,211,238,0.2);}
.tab:hover:not(.active){color:var(--txt2);}
.section{display:none;}
.section.active{display:block;animation:fi 0.2s ease;}
@keyframes fi{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

/* ERROR */
.ebanner{background:var(--red-d);border:1px solid rgba(248,113,113,0.25);border-radius:8px;
  padding:8px 12px;margin-bottom:12px;display:flex;align-items:center;gap:8px;
  font-size:11px;color:var(--red);}
.ebanner.hidden{display:none;}

/* KPI GRID — compact horizontal cards */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:8px;margin-bottom:12px;}
.kpi{
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:var(--r);padding:10px 12px;
  transition:border-color 0.18s,transform 0.18s;
  position:relative;overflow:hidden;
}
.kpi::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--kc,var(--cyan)),transparent);opacity:0.5;}
.kpi:hover{border-color:var(--border-l);transform:translateY(-1px);}
.kpi-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.kpi-ico{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;background:var(--kb,var(--cyan-d));}
.kpi-lbl{font-size:9.5px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:0.5px;line-height:1.3;}
.kpi-val{font-family:'JetBrains Mono';font-size:22px;font-weight:600;letter-spacing:-0.5px;color:var(--kc,var(--txt));line-height:1;}
.kpi-sub{font-size:10px;color:var(--txt3);margin-top:3px;line-height:1.4;}
.kpi-sub strong{color:var(--txt2);font-weight:600;}

/* PIPELINE */
.pipe-wrap{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:12px;}
.pipe-title{font-size:10px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:10px;}
.pipeline{display:flex;align-items:stretch;gap:0;border-radius:8px;overflow:hidden;border:1px solid var(--border);}
.ps{flex:1;padding:10px 10px;background:var(--bg-hover);border-right:1px solid var(--border);position:relative;transition:background 0.15s;}
.ps:last-child{border-right:none;}
.ps:hover{background:#18233a;}
.ps::after{content:'›';position:absolute;right:-8px;top:50%;transform:translateY(-50%);color:var(--txt3);font-size:14px;z-index:2;pointer-events:none;}
.ps:last-child::after{display:none;}
.ps-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:var(--txt3);margin-bottom:4px;}
.ps-val{font-family:'JetBrains Mono';font-size:18px;font-weight:700;line-height:1;}
.ps-pct{font-size:9px;color:var(--txt3);margin-top:2px;}
.ps-bar{height:2px;border-radius:2px;margin-top:7px;opacity:0.7;}

/* CHARTS */
.charts-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(360px,1fr));gap:8px;margin-bottom:12px;}
.cc{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;}
.cc h3{font-size:10px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.cc h3::before{content:'';width:3px;height:10px;border-radius:2px;background:var(--cyan);display:inline-block;}

/* SPLIT */
.split-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.sc{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;}
.sc-lbl{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--txt3);margin-bottom:6px;display:flex;align-items:center;gap:5px;}
.sc-lbl .dot{width:7px;height:7px;border-radius:50%;display:inline-block;}
.sc-val{font-family:'JetBrains Mono';font-size:26px;font-weight:700;line-height:1;}
.sc-sub{font-size:10px;color:var(--txt3);margin-top:4px;}

/* TABLE */
.tc{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:12px;overflow-x:auto;}
.tc h3{font-size:10px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.tc h3::before{content:'';width:3px;height:10px;border-radius:2px;background:var(--amber);display:inline-block;}
table{width:100%;border-collapse:collapse;}
thead th{text-align:left;padding:7px 10px;font-weight:700;color:var(--txt3);border-bottom:1px solid var(--border);font-size:9.5px;text-transform:uppercase;letter-spacing:0.5px;white-space:nowrap;}
tbody td{padding:7px 10px;border-bottom:1px solid rgba(26,37,64,0.6);color:var(--txt2);white-space:nowrap;font-size:11.5px;}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover td{background:var(--bg-hover);}
.badge{display:inline-block;padding:2px 6px;border-radius:4px;font-size:9.5px;font-weight:700;letter-spacing:0.2px;}
.b-g{background:var(--green-d);color:var(--green);}
.b-r{background:var(--red-d);color:var(--red);}
.b-a{background:var(--amber-d);color:var(--amber);}
.b-b{background:var(--blue-d);color:var(--blue);}
.b-p{background:var(--purple-d);color:var(--purple);}
.b-c{background:var(--cyan-d);color:var(--cyan);}

/* LOADING */
.lov{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px;gap:12px;}
.spinner{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--cyan);border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* SECTION HDR */
.sh{display:flex;align-items:center;gap:8px;margin-bottom:8px;margin-top:4px;}
.sh span{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:var(--txt3);}
.sh::after{content:'';flex:1;height:1px;background:var(--border);}

@media(max-width:900px){
  .hdr{padding:0 12px;height:auto;flex-wrap:wrap;padding:8px 12px;}
  .main{padding:10px 12px;}
  .charts-grid{grid-template-columns:1fr;}
  .split-grid{grid-template-columns:1fr;}
  .pipeline{flex-direction:column;}
  .ps::after{display:none;}
  .kpi-grid{grid-template-columns:repeat(2,1fr);}
  .tabs{width:100%;}
  .tab{flex:1;text-align:center;font-size:10px;padding:5px 8px;}
}
</style>
</head>
<body>
<header class="hdr">
  <div class="hdr-l">
    <div class="logo">AT</div>
    <span class="brand">Aditi <em>Tracking</em> &mdash; Sales KPI</span>
  </div>
  <div class="hdr-r">
    <span id="statusIndicator" class="srow"><span class="sdot loading"></span><span>Connecting...</span></span>
    <span id="lastUpdated" class="ts"></span>
    <div class="dpill"><label>From</label><input type="date" id="dateFrom"></div>
    <div class="dpill"><label>To</label><input type="date" id="dateTo"></div>
    <button class="btn btn-p" onclick="applyFilters()">Apply</button>
    <button class="btn btn-o" onclick="resetFilters()">Reset</button>
    <button class="btn btn-o" onclick="fetchAllData()" title="Refresh">↺</button>
  </div>
</header>

<main class="main">
  <div class="ebanner hidden" id="errorBanner"><span>⚠</span><span id="errorText"></span></div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('overview',this)">◈ Overview</button>
    <button class="tab" onclick="switchTab('inside',this)">📞 Inside Sales</button>
    <button class="tab" onclick="switchTab('field',this)">🚗 Field Sales</button>
  </div>
  <div class="section active" id="sec-overview"><div id="overviewContent"><div class="lov"><div class="spinner"></div><span style="font-size:11px;color:var(--txt3)">Loading...</span></div></div></div>
  <div class="section" id="sec-inside"><div id="insideContent"><div class="lov"><div class="spinner"></div><span style="font-size:11px;color:var(--txt3)">Loading Inside Sales...</span></div></div></div>
  <div class="section" id="sec-field"><div id="fieldContent"><div class="lov"><div class="spinner"></div><span style="font-size:11px;color:var(--txt3)">Loading Field Sales...</span></div></div></div>
</main>

<script>

// ============================================================
//  API ENDPOINTS
// ============================================================
const INSIDE_SALES_API = "https://script.google.com/macros/s/AKfycbxsC_glUfbC5RJSs0BPFYQI5jbsM5p6VeIraKcl-cO8zC8VjVnLqFYQuumhRP69oEy2/exec";
const FIELD_SALES_API  = "https://script.google.com/macros/s/AKfycbyPgpnZ31W0qhSL3fVJOC0UbVadmwiZyaPcLpiGdYertNEkYIjNe6u5LVNEZIrSsF0u_Q/exec";

// ============================================================
//  STATE
// ============================================================
let insideData=[], fieldData=[], filteredInsideData=[], filteredFieldData=[], chartInstances={};

// ============================================================
//  UTILITIES
// ============================================================
function setStatus(t,txt){ document.getElementById('statusIndicator').innerHTML='<span class="sdot '+t+'"></span><span>'+txt+'</span>'; }
function showError(m){ document.getElementById('errorBanner').classList.remove('hidden'); document.getElementById('errorText').textContent=m; }
function hideError(){ document.getElementById('errorBanner').classList.add('hidden'); }
function num(n){ return Number(n)||0; }
function has(v){ return v!==null&&v!==undefined&&v!==''; }
function isYes(v){ return v&&String(v).trim().toLowerCase()==='yes'; }
function pct(a,b){ return b>0?((a/b)*100).toFixed(0)+'%':'—'; }

function fmt(n){
  if(n>=10000000) return '₹'+(n/10000000).toFixed(2)+' Cr';
  if(n>=100000)   return '₹'+(n/100000).toFixed(1)+' L';
  if(n>=1000)     return '₹'+(n/1000).toFixed(1)+'K';
  return '₹'+n.toLocaleString('en-IN');
}

function parseDate(v){
  if(!v) return null;
  if(v instanceof Date) return isNaN(v)?null:v;
  const s=String(v).trim();
  const m=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})/);
  if(m){ let y=parseInt(m[3]); if(y<100)y+=2000; const d=new Date(y,parseInt(m[2])-1,parseInt(m[1])); return isNaN(d)?null:d; }
  const d=new Date(s); return isNaN(d.getTime())?null:d;
}

// Auto-detect Expected Revenue column — scans row keys for anything containing "revenue"
let _erCol = null;
function getERCol(data){
  if(_erCol) return _erCol;
  if(!data||!data.length) return null;
  const keys=Object.keys(data[0]);
  const exact=['Expected Revenue (₹)','Expected Revenue','ExpectedRevenue','Expected Revenue(Rs)','Expected Revenue (Rs)'];
  for(const e of exact) if(keys.includes(e)){_erCol=e;return _erCol;}
  const fuzzy=keys.find(k=>k.toLowerCase().includes('revenue'));
  if(fuzzy){_erCol=fuzzy;return _erCol;}
  console.warn('FS: No revenue column found. Available keys:',keys);
  return null;
}
function getER(r,col){
  if(!col) return 0;
  const raw=r[col];
  if(raw===null||raw===undefined||raw==='') return 0;
  const cleaned=String(raw).replace(/[₹,\s]/g,'');
  const v=parseFloat(cleaned);
  return isNaN(v)?0:v;
}

// Detect email column (checks multiple possible names)
const EMAIL_FIELDS=['Email','email','Email ID','EmailID','Customer Email','Email Address','E-mail','EMail'];
function getEmail(r){
  for(const f of EMAIL_FIELDS) if(r[f]&&String(r[f]).trim()) return String(r[f]).trim().toLowerCase();
  // Fallback: phone or customer name to identify same lead
  return (r['Phone']||r['Mobile']||r['Customer Name']||'').toString().trim().toLowerCase();
}

function dc(id){ if(chartInstances[id]){ chartInstances[id].destroy(); delete chartInstances[id]; } }

const cDef={
  responsive:true, maintainAspectRatio:false,
  plugins:{
    legend:{labels:{color:'#7d93b4',font:{family:'Inter',size:10},padding:10,usePointStyle:true,pointStyleWidth:7}},
    tooltip:{backgroundColor:'#0d1420',titleColor:'#e2e8f4',bodyColor:'#7d93b4',borderColor:'#1a2540',borderWidth:1,padding:9,titleFont:{family:'Inter',weight:'600',size:11},bodyFont:{family:'Inter',size:10},cornerRadius:7}
  },
  scales:{
    x:{ticks:{color:'#3d5070',font:{family:'Inter',size:10}},grid:{color:'rgba(26,37,64,0.5)'},border:{color:'transparent'}},
    y:{ticks:{color:'#3d5070',font:{family:'Inter',size:10}},grid:{color:'rgba(26,37,64,0.5)'},border:{color:'transparent'}}
  }
};

// ============================================================
//  FETCH
// ============================================================
async function fetchSheet(url){
  const res=await fetch(url,{redirect:'follow'});
  const text=await res.text();
  try{
    const json=JSON.parse(text);
    if(Array.isArray(json)) return json;
    if(json&&typeof json==='object') for(const k of Object.keys(json)) if(Array.isArray(json[k])) return json[k];
    console.warn('API non-array:',typeof json,json); return [];
  }catch(e){ console.error('JSON parse fail. Raw:',text.substring(0,500)); return []; }
}

async function fetchAllData(){
  setStatus('loading','Fetching data...'); hideError();
  try{
    const[insRes,fldRes]=await Promise.allSettled([fetchSheet(INSIDE_SALES_API),fetchSheet(FIELD_SALES_API)]);
    let iOk=false,fOk=false;
    if(insRes.status==='fulfilled'&&Array.isArray(insRes.value)){ insideData=insRes.value; iOk=insideData.length>0; }
    else{ insideData=[]; console.error('IS err:',insRes.reason||'empty'); }
    if(fldRes.status==='fulfilled'&&Array.isArray(fldRes.value)){ fieldData=fldRes.value; fOk=fieldData.length>0; }
    else{ fieldData=[]; console.error('FS err:',fldRes.reason||'empty'); }
    filteredInsideData=insideData.slice(); filteredFieldData=fieldData.slice();
    if(iOk&&fOk) setStatus('live','Live · '+(insideData.length+fieldData.length)+' records');
    else if(iOk||fOk){ setStatus('live','Partial · '+(insideData.length+fieldData.length)+' records'); showError('One API returned empty. Showing available data.'); }
    else{ setStatus('error','Failed'); showError('Both APIs returned empty. Open browser console (F12) for details.'); }
    document.getElementById('lastUpdated').textContent='Updated '+new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
    renderAll();
  }catch(e){ console.error('Fetch error:',e); setStatus('error','Error'); showError('Network error: '+e.message); }
}

// ============================================================
//  FILTERS
// ============================================================
function applyFilters(){
  const fr=document.getElementById('dateFrom').value?new Date(document.getElementById('dateFrom').value):null;
  const to=document.getElementById('dateTo').value?new Date(document.getElementById('dateTo').value+'T23:59:59'):null;
  filteredInsideData=(insideData||[]).filter(r=>{const d=parseDate(r['Timestamp']);if(!d)return true;if(fr&&d<fr)return false;if(to&&d>to)return false;return true;});
  filteredFieldData=(fieldData||[]).filter(r=>{const d=parseDate(r['Timestamp']||r['Date']);if(!d)return true;if(fr&&d<fr)return false;if(to&&d>to)return false;return true;});
  renderAll();
}
function resetFilters(){
  document.getElementById('dateFrom').value=''; document.getElementById('dateTo').value='';
  filteredInsideData=insideData.slice(); filteredFieldData=fieldData.slice(); renderAll();
}
function switchTab(tab,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  el.classList.add('active'); document.getElementById('sec-'+tab).classList.add('active');
}

// ============================================================
//  INSIDE SALES COMPUTATION
// ============================================================
function compIS(data){
  // Build first-contact date map from the FULL (unfiltered) dataset
  // so the 60-day rule is always measured from original first contact
  const allIS = insideData.length>0 ? insideData : data;
  const firstContact={};
  allIS.forEach(r=>{
    const em=getEmail(r); if(!em) return;
    const d=parseDate(r['Timestamp']);
    if(d&&(!firstContact[em]||d<firstContact[em])) firstContact[em]=d;
  });

  const t=data.length;

  // NEW leads = first-ever appearance of that email/identifier
  const seenNew=new Set();
  let newLeads=0;
  [...data].sort((a,b)=>(parseDate(a['Timestamp'])||0)-(parseDate(b['Timestamp'])||0))
    .forEach(r=>{ const em=getEmail(r); if(!seenNew.has(em)){seenNew.add(em);newLeads++;} });

  // FOLLOW-UP calls = rows where any follow-up column is filled
  const followUps=data.filter(r=>
    has(r['Follow-up 1 '])||has(r['Follow-up 1'])||
    has(r['Follow-up 2 '])||has(r['Follow-up 2'])||
    has(r['Follow-up 3'])
  ).length;

  const dg   = data.filter(r=>isYes(r['Is the Demo Given'])).length;
  const qs   = data.filter(r=>isYes(r['Quotation Sent'])).length;
  const wonRows = data.filter(r=>isYes(r['Won']));
  const w    = wonRows.length;
  const l    = data.filter(r=>has(r['Lost'])&&!isYes(r['Won'])).length;
  const junk = data.filter(r=>String(r['Lead Quality']||'').toLowerCase()==='junk'||String(r['Remarks']||'').toLowerCase().includes('junk')).length;
  const wr   = qs>0?((w/qs)*100).toFixed(1):0;

  // NBD vs Existing — 60-day rule applied per closed deal
  let totalRev=0, nbdRev=0, exRev=0, nbdWon=0, exWon=0;
  wonRows.forEach(r=>{
    const val=num(r['Order Value']); totalRev+=val;
    const em=getEmail(r);
    const firstD=firstContact[em];
    const wonD=parseDate(r['Timestamp']);
    const days=(firstD&&wonD)?(wonD-firstD)/86400000:0;
    if(days<=60){ nbdRev+=val; nbdWon++; } else { exRev+=val; exWon++; }
  });

  const avg=w>0?totalRev/w:0;

  // Lead temperature
  const hot  = data.filter(r=>String(r['LeadType']||r['Lead Type']||'').toLowerCase()==='hot').length;
  const warm = data.filter(r=>String(r['LeadType']||r['Lead Type']||'').toLowerCase()==='warm').length;
  const cold = data.filter(r=>String(r['LeadType']||r['Lead Type']||'').toLowerCase()==='cold').length;

  // Source / Solution maps
  const src={}, sol={}, rbs={};
  data.forEach(r=>{ const s=r['Source']||'Unknown'; src[s]=(src[s]||0)+1; });
  data.forEach(r=>{ const s=r['Solution']||'Unknown'; sol[s]=(sol[s]||0)+1; });
  wonRows.forEach(r=>{ const s=r['Source']||'Unknown'; rbs[s]=(rbs[s]||0)+num(r['Order Value']); });

  // Follow-up breakdown
  const f1=data.filter(r=>has(r['Follow-up 1 '])||has(r['Follow-up 1'])).length;
  const f2=data.filter(r=>has(r['Follow-up 2 '])||has(r['Follow-up 2'])).length;
  const f3=data.filter(r=>has(r['Follow-up 3'])).length;

  return{t,newLeads,followUps,f1,f2,f3,dg,qs,w,l,junk,wr,totalRev,nbdRev,exRev,nbdWon,exWon,avg,hot,warm,cold,src,sol,rbs,wonRows,firstContact};
}

// ============================================================
//  FIELD SALES COMPUTATION
// ============================================================
function compFS(data){
  const t=data.length, pc='Purpose of Visit';
  const nv = data.filter(r=>String(r[pc]||'').toLowerCase().includes('new')).length;
  const ev = data.filter(r=>{ const v=String(r[pc]||'').toLowerCase(); return v.includes('exisit')||v.includes('exist'); }).length;
  const fv = data.filter(r=>String(r[pc]||'').toLowerCase().includes('follow')).length;
  const int_= data.filter(r=>{ const v=String(r['Winning Chances']||'').toLowerCase(); return (v.includes('intersted')||v.includes('interested'))&&!v.includes('not'); }).length;
  const nint= data.filter(r=>String(r['Winning Chances']||'').toLowerCase().includes('not inter')).length;

  // Auto-detect the revenue column from actual sheet headers
  // Resets cache so each compFS call uses freshest data headers
  _erCol = null;
  const erCol = getERCol(data);
  console.log('FS Revenue column detected:', erCol);

  const ter=data.reduce((s,r)=>s+getER(r,erCol),0);
  let nr=0,er=0;
  data.forEach(r=>{ const v=getER(r,erCol); if(v===0)return; const p=String(r[pc]||'').toLowerCase(); if(p.match(/exisit|exist/))er+=v; else nr+=v; });
  const bsp={};
  data.forEach(r=>{
    const sp=r['Sales Person Name']||r['Salesperson']||'Unknown';
    if(!bsp[sp])bsp[sp]={vis:0,nv:0,ev:0,fv:0,rev:0};
    bsp[sp].vis++; bsp[sp].rev+=getER(r,erCol);
    const p=String(r[pc]||'').toLowerCase();
    if(p.includes('new'))bsp[sp].nv++;
    if(p.match(/exisit|exist/))bsp[sp].ev++;
    if(p.includes('follow'))bsp[sp].fv++;
  });
  const bpd={};
  data.forEach(r=>{ const p=r['Product']||'Unknown'; bpd[p]=(bpd[p]||0)+1; });
  return{t,nv,ev,fv,int_,nint,ter,nr,er,bsp,bpd,erCol};
}

        <th>Salesperson</th><th>Total</th><th>New (NBD)</th><th>Existing</th><th>Follow-up</th><th>Exp. Revenue</th>
      </tr></thead><tbody>
        ${sp.map(([n,d])=>'<tr>'
          +'<td style="color:var(--txt);font-weight:600">'+n+'</td>'
          +'<td style="font-family:JetBrains Mono,monospace">'+d.vis+'</td>'
          +'<td><span class="badge b-g">'+d.nv+'</span></td>'
          +'<td><span class="badge b-p">'+d.ev+'</span></td>'
          +'<td><span class="badge b-a">'+d.fv+'</span></td>'
          +'<td style="color:var(--green);font-family:JetBrains Mono,monospace">'+fmt(d.rev)+'</td>'
          +'</tr>').join('')}
      </tbody></table>
    </div>`;

  dc('c9');  chartInstances['c9'] =new Chart(document.getElementById('c9'),{type:'doughnut',data:{labels:['New (NBD)','Existing','Follow-up'],datasets:[{data:[f.nv,f.ev,f.fv],backgroundColor:['#22d3ee','#a78bfa','#fbbf24'],borderWidth:0,hoverOffset:6}]},options:{...cDef,scales:{},cutout:'68%'}});
  dc('c10'); chartInstances['c10']=new Chart(document.getElementById('c10'),{type:'bar',data:{labels:pd.map(e=>e[0]),datasets:[{data:pd.map(e=>e[1]),backgroundColor:'#22d3ee',borderRadius:4,barThickness:16}]},options:{...cDef,plugins:{...cDef.plugins,legend:{display:false}}}});
  const sn=sp.map(e=>e[0]);
  dc('c11'); chartInstances['c11']=new Chart(document.getElementById('c11'),{type:'bar',data:{labels:sn,datasets:[{label:'New',data:sn.map(n=>f.bsp[n].nv),backgroundColor:'#34d399',borderRadius:4},{label:'Existing',data:sn.map(n=>f.bsp[n].ev),backgroundColor:'#a78bfa',borderRadius:4},{label:'Follow-up',data:sn.map(n=>f.bsp[n].fv),backgroundColor:'#fbbf24',borderRadius:4}]},options:{...cDef,scales:{...cDef.scales,x:{...cDef.scales.x,stacked:true},y:{...cDef.scales.y,stacked:true}}}});
  const sr=sp.filter(e=>e[1].rev>0).sort((a,b)=>b[1].rev-a[1].rev);
  dc('c12'); chartInstances['c12']=new Chart(document.getElementById('c12'),{type:'bar',data:{labels:sr.map(e=>e[0]),datasets:[{data:sr.map(e=>e[1].rev),backgroundColor:'#fbbf24',borderRadius:4,barThickness:20}]},options:{...cDef,indexAxis:'y',plugins:{...cDef.plugins,legend:{display:false}}}});
}

// ============================================================
//  BOOT — auto-fetch + refresh every 5 mins
// ============================================================
document.addEventListener('DOMContentLoaded',()=>{ fetchAllData(); setInterval(fetchAllData,300000); });

</script>
