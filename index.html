<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aditi Tracking — Sales KPI Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    @keyframes sp { to { transform: rotate(360deg); } }
  </style>

  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>

</head>
<body>
  <div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useMemo } = React;
const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, PieChart, Pie, Cell, ComposedChart, Line } = Recharts;

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  PASTE YOUR GOOGLE APPS SCRIPT WEB APP URLs BELOW
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const FIELD_SCRIPT_URL = "PASTE_YOUR_FIELD_SALES_SCRIPT_URL_HERE";
const INSIDE_SCRIPT_URL = "PASTE_YOUR_INSIDE_SALES_SCRIPT_URL_HERE";
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

const REFRESH_MS = 5 * 60 * 1000;
const COLORS = ["#3b82f6","#10b981","#f59e0b","#ef4444","#8b5cf6","#ec4899","#06b6d4","#84cc16","#f97316"];
const fmt = (v) => { if (!v || isNaN(v)) return "₹0"; if (v >= 100000) return `₹${(v/100000).toFixed(1)}L`; if (v >= 1000) return `₹${(v/1000).toFixed(1)}K`; return `₹${v}`; };
const fN = (v) => (v ?? 0).toLocaleString("en-IN");

// ─── DATA PROCESSORS ─────────────────────────────────────────────────────────

function processField(rows) {
  const d = { total: 0, purposeNew: 0, purposeExist: 0, purposeFU: 0, interested: 0, notInterested: 0, blankInterest: 0, revenue: 0, sp: {}, products: {}, locations: {}, monthly: {} };

  rows.forEach((r) => {
    const purpose = String(r["Purpose of Visit"] || r["LeadType"] || "").trim().toLowerCase();
    const person = String(r["Sales Person Name"] || "").trim();
    const loc = String(r["Location"] || "").trim();
    const prod = String(r["Column 11"] || r["Solution"] || "").trim();
    const winRaw = String(r["Winning Chances"] || r["Win Chances"] || "").trim().toLowerCase();
    const revRaw = parseFloat(String(r["Expected Revenue (₹)"] || r["Expected Revenue"] || r["Order Value"] || "0").replace(/[₹,\s]/g, ""));
    const rev = isNaN(revRaw) || revRaw <= 1 ? 0 : revRaw;
    const dateStr = String(r["Date"] || r["Timestamp"] || "");

    if (!purpose && !person && !loc) return;
    d.total++;

    if (purpose.includes("new") || purpose.includes("nbd")) d.purposeNew++;
    else if (purpose.includes("follow") || purpose.includes("lead follow")) d.purposeFU++;
    else if (purpose.includes("exist") || purpose.includes("repeat") || purpose.includes("payment")) d.purposeExist++;
    else d.purposeNew++;

    if (winRaw.includes("not")) d.notInterested++;
    else if (winRaw.includes("intersted") || winRaw.includes("interested") || winRaw === "yes") d.interested++;
    else d.blankInterest++;

    d.revenue += rev;

    if (person) {
      if (!d.sp[person]) d.sp[person] = { name: person, visits: 0, newV: 0, existV: 0, fuV: 0, intV: 0, rev: 0 };
      d.sp[person].visits++;
      d.sp[person].rev += rev;
      if (purpose.includes("new") || purpose.includes("nbd")) d.sp[person].newV++;
      else if (purpose.includes("follow")) d.sp[person].fuV++;
      else d.sp[person].existV++;
      if (!winRaw.includes("not") && (winRaw.includes("intersted") || winRaw.includes("interested"))) d.sp[person].intV++;
    }

    if (prod) {
      prod.split(",").map(p => p.trim()).filter(Boolean).forEach(p => {
        const k = p.includes("AIS") ? "AIS 140" : p.includes("2G") || p.includes("Basic 2G") ? "Basic 2G" : p.includes("Fuel") ? "Fuel Sensor" : p.includes("Dash") ? "Dashcam" : p.includes("Cool") ? "Cool Bus" : (p.includes("4G") || p.includes("Advance")) ? "Advance 4G" : p.includes("TPMS") ? "TPMS" : p.includes("Sim") ? "Sim Track" : p;
        d.products[k] = (d.products[k] || 0) + 1;
      });
    }

    if (loc) {
      const ll = loc.toLowerCase();
      const region = ll.match(/ponda|margoa|madgoa|canacona|verna|colva|kundaim|usgoa|shiroda|dharban|savordem|farma|borim|bali|tiskar|cuncolim|bethoda|collem|havei|mobor|benaulim|cola|concolim|lotlim/) ? "Goa (South)"
        : ll.match(/mapusa|bicholim|calangute|anjuna|panaji|panjim|nachinola|arambol|cond[eo]lim|porvorim|siolim|guirim|bord[ea]|dona paula|sanquelim|old goa|duler|thivim|aldona|arpora|maem|sirc|honda|calvam/) ? "Goa (North)"
        : ll.match(/bangalore|hosur/) ? "Bangalore"
        : ll.match(/pune|wagholi|baner|pashan|kharadi|warje|aundh|balewadi|sangvi|katraj|saswad|shivaji|swarget|pcmc|pimlegurav|transport nagar|dube nagar|ambegaon|shevgaon|wadgoan/) ? "Pune"
        : ll.match(/mumbai|navi mumbai|borivali|andheri|mira road|goregaon|dadar|dombivali|kandivali|vile parle|versova|charni|malad|prabhadevi|curry/) ? "Mumbai"
        : ll.match(/vadodara|ahemdabad|anand|nadiad|rajkot/) ? "Gujarat"
        : ll.match(/hubli|dharwad/) ? "Karnataka"
        : "Others";
      d.locations[region] = (d.locations[region] || 0) + 1;
    }

    if (dateStr) {
      try {
        const pts = dateStr.toString().split("/");
        if (pts.length >= 3) {
          const m = parseInt(pts[0]), dy = parseInt(pts[1]), y = parseInt(pts[2]);
          if (m > 0 && m <= 12) {
            const dt = new Date(y < 100 ? 2000 + y : y, m - 1, dy);
            if (!isNaN(dt)) {
              const k = dt.toLocaleDateString("en-US", { month: "short", year: "2-digit" });
              if (!d.monthly[k]) d.monthly[k] = { month: k, visits: 0, newV: 0, existV: 0, fuV: 0 };
              d.monthly[k].visits++;
              if (purpose.includes("new")) d.monthly[k].newV++;
              else if (purpose.includes("follow")) d.monthly[k].fuV++;
              else d.monthly[k].existV++;
            }
          }
        }
      } catch (e) {}
    }
  });
  return d;
}

function processInside(rows) {
  const d = { total: 0, fc: 0, fu1: 0, fu2: 0, fu3: 0, qs: 0, won: 0, lost: 0, wonRev: 0, demoYes: 0, hot: 0, warm: 0, cold: 0, junk: 0, sources: {}, deals: [], monthly: {} };

  rows.forEach((r) => {
    const name = String(r["Customer Name"] || "").trim();
    if (!name) return;
    d.total++;

    const has = (col) => { const v = String(r[col] || "").trim().toLowerCase(); return v && v !== "no" && v !== ""; };
    if (has("1st Call")) d.fc++;
    if (has("Follow-up 1") || has("D1")) d.fu1++;
    if (has("Follow-up 2") || has("D3")) d.fu2++;
    if (has("Follow-up 3") || has("D7")) d.fu3++;
    if (has("Quotation Sent")) d.qs++;

    const w = String(r["Won"] || "").trim().toLowerCase();
    const l = String(r["Lost"] || "").trim().toLowerCase();
    const ov = parseFloat(String(r["Order Value"] || "0").replace(/[₹,\s]/g, ""));
    const rev = isNaN(ov) ? 0 : ov;
    if (w === "yes") { d.won++; d.wonRev += rev; if (rev > 0) d.deals.push({ name, value: rev, product: String(r["Hero Product"] || "") }); }
    if (l && l !== "no" && l !== "") d.lost++;

    if (String(r["Is the Demo Given"] || "").trim().toLowerCase() === "yes") d.demoYes++;

    const lt = String(r["LeadType"] || r["Lead Quality"] || "").trim().toLowerCase();
    if (lt.includes("hot")) d.hot++;
    else if (lt.includes("warm")) d.warm++;
    else if (lt.includes("cold")) d.cold++;
    if (String(r["Lead Quality"] || "").toLowerCase().includes("junk")) d.junk++;

    const src = String(r["Source"] || "").trim();
    if (src) {
      if (!d.sources[src]) d.sources[src] = { name: src, total: 0, won: 0, hot: 0, warm: 0, cold: 0 };
      d.sources[src].total++;
      if (w === "yes") d.sources[src].won++;
      if (lt.includes("hot")) d.sources[src].hot++;
      else if (lt.includes("warm")) d.sources[src].warm++;
      else d.sources[src].cold++;
    }

    const ts = String(r["Timestamp"] || "");
    if (ts) {
      try {
        const pts = ts.split(/[/ ]/);
        if (pts.length >= 3) {
          const day = parseInt(pts[0]), mo = parseInt(pts[1]), yr = parseInt(pts[2]);
          const dt = new Date(yr < 100 ? 2000 + yr : yr, mo - 1, day);
          if (!isNaN(dt)) {
            const k = dt.toLocaleDateString("en-US", { month: "short", year: "2-digit" });
            if (!d.monthly[k]) d.monthly[k] = { month: k, leads: 0, won: 0, revenue: 0 };
            d.monthly[k].leads++;
            if (w === "yes") { d.monthly[k].won++; d.monthly[k].revenue += rev; }
          }
        }
      } catch (e) {}
    }
  });

  d.deals.sort((a, b) => b.value - a.value);
  d.deals = d.deals.slice(0, 8);
  return d;
}

// ─── REUSABLE UI ─────────────────────────────────────────────────────────────

const Box = ({ children, style }) => <div style={{ background: "rgba(255,255,255,0.025)", borderRadius: 12, padding: 18, border: "1px solid rgba(255,255,255,0.05)", ...style }}>{children}</div>;

const KPI = ({ label, value, sub, accent = "#3b82f6" }) => (
  <Box style={{ position: "relative", overflow: "hidden" }}>
    <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: 3, background: accent }} />
    <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 1.5, color: "rgba(255,255,255,0.36)", textTransform: "uppercase", marginBottom: 4 }}>{label}</div>
    <div style={{ fontSize: 26, fontWeight: 700, color: "#fff", lineHeight: 1.1 }}>{value}</div>
    {sub && <div style={{ fontSize: 11, color: "rgba(255,255,255,0.38)", marginTop: 3 }}>{sub}</div>}
  </Box>
);

const FBar = ({ label, value, total, color }) => {
  const pct = total ? ((value / total) * 100).toFixed(0) : 0;
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 5 }}>
      <div style={{ width: 95, textAlign: "right", fontSize: 11, color: "rgba(255,255,255,0.48)", fontWeight: 500 }}>{label}</div>
      <div style={{ flex: 1, height: 24, borderRadius: 5, background: "rgba(255,255,255,0.035)", overflow: "hidden" }}>
        <div style={{ width: `${Math.max(pct, 2)}%`, height: "100%", background: `linear-gradient(90deg, ${color}, ${color}80)`, borderRadius: 5, display: "flex", alignItems: "center", paddingLeft: 8, minWidth: 38, transition: "width 0.6s" }}>
          <span style={{ fontSize: 11, fontWeight: 700, color: "#fff" }}>{fN(value)}</span>
        </div>
      </div>
      <span style={{ fontSize: 10, fontWeight: 600, color: "rgba(255,255,255,0.32)", width: 34, textAlign: "right" }}>{pct}%</span>
    </div>
  );
};

const Tag = ({ color, children }) => <span style={{ fontSize: 9, fontWeight: 700, background: color, color: "#000", padding: "2px 8px", borderRadius: 4, letterSpacing: 1.4, textTransform: "uppercase" }}>{children}</span>;
const SH = ({ tag, tagColor, title }) => (
  <div style={{ display: "flex", alignItems: "center", gap: 10, margin: "26px 0 14px" }}>
    {tag && <Tag color={tagColor}>{tag}</Tag>}
    <h2 style={{ fontSize: 15, fontWeight: 700, color: "#fff", margin: 0 }}>{title}</h2>
    <div style={{ flex: 1, height: 1, background: "rgba(255,255,255,0.06)" }} />
  </div>
);

const TT = ({ active, payload, label }) => {
  if (!active || !payload?.length) return null;
  return (
    <div style={{ background: "#181828", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 8, padding: "8px 12px", fontSize: 11 }}>
      <div style={{ fontWeight: 600, color: "#fff", marginBottom: 3 }}>{label}</div>
      {payload.map((p, i) => <div key={i} style={{ color: p.color }}>{p.name}: {typeof p.value === "number" && p.value > 999 ? fmt(p.value) : fN(p.value)}</div>)}
    </div>
  );
};

const MP = ({ data, size = 108 }) => (
  <PieChart width={size} height={size}>
    <Pie data={data} cx={size/2} cy={size/2} innerRadius={size*0.26} outerRadius={size*0.44} paddingAngle={3} dataKey="value" stroke="none">
      {data.map((d, i) => <Cell key={i} fill={d.color || COLORS[i]} />)}
    </Pie>
  </PieChart>
);

const SC = ({ label, value, total, color }) => (
  <div style={{ background: "rgba(255,255,255,0.02)", borderRadius: 8, padding: "12px 6px", border: "1px solid rgba(255,255,255,0.04)", textAlign: "center", borderTop: `3px solid ${color}` }}>
    <div style={{ fontSize: 9, color: "rgba(255,255,255,0.34)", fontWeight: 600, letterSpacing: 1.1, textTransform: "uppercase", marginBottom: 3 }}>{label}</div>
    <div style={{ fontSize: 20, fontWeight: 700, color: "#fff" }}>{value}</div>
    <div style={{ fontSize: 9, color, fontWeight: 600 }}>{total ? `${((value / total) * 100).toFixed(0)}%` : "100%"}</div>
  </div>
);

// ─── MAIN ────────────────────────────────────────────────────────────────────

function Dashboard() {
  const [tab, setTab] = useState("overview");
  const [fRows, setFRows] = useState(null);
  const [iRows, setIRows] = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [lastRefresh, setLastRefresh] = useState(null);

  const notCfg = FIELD_SCRIPT_URL.includes("PASTE_YOUR") || INSIDE_SCRIPT_URL.includes("PASTE_YOUR");

  const fetchData = useCallback(async () => {
    if (notCfg) { setLoading(false); return; }
    setLoading(true); setError(null);
    try {
      const [fRes, iRes] = await Promise.all([fetch(FIELD_SCRIPT_URL), fetch(INSIDE_SCRIPT_URL)]);
      if (!fRes.ok) throw new Error(`Field script error: ${fRes.status}`);
      if (!iRes.ok) throw new Error(`Inside script error: ${iRes.status}`);
      const fJ = await fRes.json(); const iJ = await iRes.json();
      setFRows(fJ.data || []); setIRows(iJ.data || []); setLastRefresh(new Date());
    } catch (e) { setError(e.message); }
    finally { setLoading(false); }
  }, [notCfg]);

  useEffect(() => { fetchData(); const iv = setInterval(fetchData, REFRESH_MS); return () => clearInterval(iv); }, [fetchData]);

  const F = useMemo(() => fRows ? processField(fRows) : null, [fRows]);
  const I = useMemo(() => iRows ? processInside(iRows) : null, [iRows]);

  const spA = useMemo(() => F ? Object.values(F.sp).sort((a, b) => b.visits - a.visits) : [], [F]);
  const prA = useMemo(() => F ? Object.entries(F.products).map(([n, v]) => ({ name: n, value: v })).sort((a, b) => b.value - a.value) : [], [F]);
  const loA = useMemo(() => F ? Object.entries(F.locations).map(([n, v]) => ({ name: n, value: v })).sort((a, b) => b.value - a.value) : [], [F]);
  const srA = useMemo(() => I ? Object.values(I.sources).sort((a, b) => b.total - a.total).slice(0, 8) : [], [I]);
  const fM = useMemo(() => F ? Object.values(F.monthly).sort((a, b) => new Date("1 " + a.month) - new Date("1 " + b.month)) : [], [F]);
  const iM = useMemo(() => I ? Object.values(I.monthly).sort((a, b) => new Date("1 " + a.month) - new Date("1 " + b.month)) : [], [I]);

  const cr = I?.total ? ((I.won / I.total) * 100).toFixed(1) : "0";
  const ir = F?.total ? ((F.interested / F.total) * 100).toFixed(1) : "0";
  const qr = I?.qs ? ((I.won / I.qs) * 100).toFixed(0) : "0";

  const tabs = [{ id: "overview", label: "Overview" }, { id: "inside", label: "Inside Sales" }, { id: "field", label: "Field Sales" }, { id: "pipeline", label: "Pipeline & Insights" }];

  // ── SETUP SCREEN ───
  if (notCfg) {
    return (
      <div style={{ minHeight: "100vh", background: "#0a0a12", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "'DM Sans', sans-serif", padding: 32 }}>
        <div style={{ maxWidth: 560, textAlign: "center" }}>
          <div style={{ fontSize: 48, marginBottom: 16 }}>🔗</div>
          <h1 style={{ fontSize: 22, fontWeight: 700, color: "#fff", margin: "0 0 8px" }}>Connect Your Private Google Sheets</h1>
          <p style={{ fontSize: 13, color: "rgba(255,255,255,0.45)", lineHeight: 1.7, margin: "0 0 24px" }}>
            Your sheets stay 100% private & restricted. A small Apps Script acts as a secure read-only data bridge.
          </p>
          <div style={{ textAlign: "left", background: "rgba(255,255,255,0.03)", borderRadius: 12, padding: 24, border: "1px solid rgba(255,255,255,0.06)" }}>
            {[
              { s: "1", t: "Open each Google Sheet", d: "Go to Extensions → Apps Script" },
              { s: "2", t: "Paste the script code below", d: "Replace any existing code in the editor" },
              { s: "3", t: "Deploy as Web App", d: "Execute as: Me · Who has access: Anyone · Deploy" },
              { s: "4", t: "Authorize when prompted", d: "Allow the script to read your spreadsheet" },
              { s: "5", t: "Copy the Web App URL", d: 'Paste it into this index.html file (top of the <script> tag)' },
            ].map((x, i) => (
              <div key={i} style={{ display: "flex", gap: 14, marginBottom: i < 4 ? 16 : 0 }}>
                <div style={{ width: 28, height: 28, borderRadius: "50%", background: "#3b82f6", color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, fontWeight: 700, flexShrink: 0 }}>{x.s}</div>
                <div><div style={{ fontSize: 13, fontWeight: 600, color: "#fff" }}>{x.t}</div><div style={{ fontSize: 11, color: "rgba(255,255,255,0.4)", marginTop: 2 }}>{x.d}</div></div>
              </div>
            ))}
          </div>
          <div style={{ marginTop: 20, padding: 16, background: "rgba(245,158,11,0.08)", borderRadius: 10, border: "1px solid rgba(245,158,11,0.15)" }}>
            <div style={{ fontSize: 12, color: "#f59e0b", fontWeight: 600, marginBottom: 6 }}>Apps Script Code (same for both sheets):</div>
            <pre style={{ fontSize: 10, color: "rgba(255,255,255,0.6)", margin: 0, whiteSpace: "pre-wrap", textAlign: "left", lineHeight: 1.6, background: "rgba(0,0,0,0.3)", padding: 12, borderRadius: 6 }}>{`function doGet(e) {
  var sheet = SpreadsheetApp.getActiveSpreadsheet().getActiveSheet();
  var data = sheet.getDataRange().getValues();
  var headers = data[0];
  var rows = [];
  for (var i = 1; i < data.length; i++) {
    var row = {};
    for (var j = 0; j < headers.length; j++) {
      row[headers[j]] = data[i][j];
    }
    rows.push(row);
  }
  return ContentService
    .createTextOutput(JSON.stringify({data:rows}))
    .setMimeType(ContentService.MimeType.JSON);
}`}</pre>
          </div>
          <div style={{ marginTop: 16, padding: 12, background: "rgba(16,185,129,0.08)", borderRadius: 8, border: "1px solid rgba(16,185,129,0.15)", textAlign: "left" }}>
            <div style={{ fontSize: 11, color: "#10b981", fontWeight: 600, marginBottom: 4 }}>🔒 Privacy guarantee</div>
            <div style={{ fontSize: 11, color: "rgba(255,255,255,0.4)", lineHeight: 1.5 }}>
              "Anyone" in the deploy settings means anyone can <strong style={{ color: "#fff" }}>call the script URL</strong> — NOT that anyone can see your sheet. Your sheet sharing stays restricted. The script only serves read-only JSON data.
            </div>
          </div>
        </div>
      </div>
    );
  }

  if (loading && !F) {
    return (
      <div style={{ minHeight: "100vh", background: "#0a0a12", display: "flex", alignItems: "center", justifyContent: "center", flexDirection: "column", gap: 14 }}>
        <div style={{ width: 36, height: 36, border: "3px solid rgba(59,130,246,0.15)", borderTop: "3px solid #3b82f6", borderRadius: "50%", animation: "sp 1s linear infinite" }} />
        <div style={{ color: "rgba(255,255,255,0.45)", fontSize: 13, fontFamily: "'DM Sans'" }}>Fetching live data from your private sheets...</div>
      </div>
    );
  }

  if (error) {
    return (
      <div style={{ minHeight: "100vh", background: "#0a0a12", display: "flex", alignItems: "center", justifyContent: "center", flexDirection: "column", gap: 14, fontFamily: "'DM Sans'", padding: 32 }}>
        <div style={{ fontSize: 36 }}>⚠️</div>
        <div style={{ color: "#ef4444", fontSize: 15, fontWeight: 600 }}>Connection Error</div>
        <div style={{ color: "rgba(255,255,255,0.45)", fontSize: 12, textAlign: "center", maxWidth: 480, lineHeight: 1.6 }}>{error}</div>
        <div style={{ color: "rgba(255,255,255,0.3)", fontSize: 11, textAlign: "center", maxWidth: 440, background: "rgba(255,255,255,0.03)", padding: 14, borderRadius: 8, border: "1px solid rgba(255,255,255,0.05)", lineHeight: 1.6 }}>
          Verify your Apps Script URLs are correct and deployed with "Anyone" access. Also check that you authorized the script when deploying.
        </div>
        <button onClick={fetchData} style={{ marginTop: 10, padding: "9px 22px", background: "#3b82f6", color: "#fff", border: "none", borderRadius: 7, fontSize: 12, fontWeight: 600, cursor: "pointer" }}>Retry</button>
      </div>
    );
  }

  if (!F || !I) return null;

  return (
    <div style={{ minHeight: "100vh", background: "#0a0a12", color: "#e2e2e2", fontFamily: "'DM Sans', sans-serif", padding: "18px 22px", maxWidth: 1200, margin: "0 auto" }}>

      {/* HEADER */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 18, flexWrap: "wrap", gap: 10 }}>
        <div>
          <h1 style={{ fontSize: 20, fontWeight: 700, color: "#fff", margin: 0 }}>Aditi Tracking — Sales KPI Dashboard</h1>
          <p style={{ fontSize: 11, color: "rgba(255,255,255,0.28)", margin: "3px 0 0" }}>🔒 Private Sheets · Auto-refreshes every 5 min</p>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          {lastRefresh && <span style={{ fontSize: 9, color: "rgba(255,255,255,0.22)" }}>Updated {lastRefresh.toLocaleTimeString()}</span>}
          <button onClick={fetchData} disabled={loading} style={{ padding: "5px 12px", background: "rgba(59,130,246,0.12)", border: "1px solid rgba(59,130,246,0.25)", borderRadius: 6, color: "#3b82f6", fontSize: 10, fontWeight: 600, cursor: loading ? "wait" : "pointer" }}>{loading ? "..." : "↻ Refresh"}</button>
          <div style={{ background: "rgba(16,185,129,0.1)", border: "1px solid rgba(16,185,129,0.22)", borderRadius: 5, padding: "3px 9px", fontSize: 9, fontWeight: 700, color: "#10b981", letterSpacing: 1 }}>● LIVE</div>
        </div>
      </div>

      {/* TABS */}
      <div style={{ display: "flex", gap: 3, marginBottom: 18, background: "rgba(255,255,255,0.02)", borderRadius: 8, padding: 3 }}>
        {tabs.map(t => <button key={t.id} onClick={() => setTab(t.id)} style={{ padding: "7px 16px", borderRadius: 6, border: "none", cursor: "pointer", fontSize: 11, fontWeight: 600, background: tab === t.id ? "rgba(59,130,246,0.14)" : "transparent", color: tab === t.id ? "#3b82f6" : "rgba(255,255,255,0.32)" }}>{t.label}</button>)}
      </div>

      {/* ═══ OVERVIEW ═══ */}
      {tab === "overview" && <>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(160px, 1fr))", gap: 10 }}>
          <KPI label="Field Visits" value={fN(F.total)} sub={`${F.purposeNew} new · ${F.purposeExist} existing`} accent="#10b981" />
          <KPI label="Inside Leads" value={fN(I.total)} sub={`${I.won} won · ${I.lost} lost`} accent="#3b82f6" />
          <KPI label="Won Revenue" value={fmt(I.wonRev)} sub={`${I.won} closed`} accent="#f59e0b" />
          <KPI label="Field Pipeline" value={fmt(F.revenue)} sub="Expected rev" accent="#8b5cf6" />
          <KPI label="Inside Conv %" value={`${cr}%`} sub="Lead → Won" accent="#ef4444" />
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, marginTop: 14 }}>
          <Box>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12 }}><Tag color="#3b82f6">INSIDE</Tag><span style={{ fontSize: 12, fontWeight: 600, color: "#fff" }}>Sales Funnel</span></div>
            <FBar label="Total" value={I.total} total={I.total} color="#3b82f6" />
            <FBar label="1st Call" value={I.fc} total={I.total} color="#6366f1" />
            <FBar label="Follow-up 1" value={I.fu1} total={I.total} color="#8b5cf6" />
            <FBar label="Follow-up 2" value={I.fu2} total={I.total} color="#a855f7" />
            <FBar label="Follow-up 3" value={I.fu3} total={I.total} color="#c084fc" />
            <FBar label="Quoted" value={I.qs} total={I.total} color="#f59e0b" />
            <FBar label="Won" value={I.won} total={I.total} color="#10b981" />
          </Box>
          <Box>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12 }}><Tag color="#10b981">FIELD</Tag><span style={{ fontSize: 12, fontWeight: 600, color: "#fff" }}>Visit Pipeline</span></div>
            <FBar label="Total" value={F.total} total={F.total} color="#10b981" />
            <FBar label="New" value={F.purposeNew} total={F.total} color="#3b82f6" />
            <FBar label="Existing" value={F.purposeExist} total={F.total} color="#06b6d4" />
            <FBar label="Follow-up" value={F.purposeFU} total={F.total} color="#f59e0b" />
            <FBar label="Interested" value={F.interested} total={F.total} color="#8b5cf6" />
            <FBar label="Not Int." value={F.notInterested} total={F.total} color="#ef4444" />
          </Box>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, marginTop: 14 }}>
          {[{ t: "NBD vs Existing — Inside", n: I.total, e: 0, tt: I.total }, { t: "NBD vs Existing — Field", n: F.purposeNew, e: F.purposeExist + F.purposeFU, tt: F.total }].map((x, i) => (
            <Box key={i}>
              <div style={{ fontSize: 11, fontWeight: 600, color: "rgba(255,255,255,0.45)", marginBottom: 10 }}>{x.t}</div>
              <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
                <MP data={[{ name: "NBD", value: x.n, color: "#3b82f6" }, { name: "Existing", value: Math.max(x.e, 1), color: "#10b981" }]} />
                <div>{[{ l: "NBD", v: x.n, c: "#3b82f6" }, { l: "Existing", v: x.e, c: "#10b981" }].map(q => (
                  <div key={q.l} style={{ marginBottom: 5, display: "flex", alignItems: "center", gap: 6 }}><span style={{ width: 8, height: 8, borderRadius: 2, background: q.c }} /><span style={{ fontSize: 11, color: "#fff" }}>{q.l}: {q.v}</span><span style={{ fontSize: 9, color: "rgba(255,255,255,0.25)" }}>({x.tt ? ((q.v / x.tt) * 100).toFixed(0) : 0}%)</span></div>
                ))}</div>
              </div>
            </Box>
          ))}
        </div>
      </>}

      {/* ═══ INSIDE ═══ */}
      {tab === "inside" && <>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(135px, 1fr))", gap: 10 }}>
          <KPI label="Total Leads" value={I.total} accent="#3b82f6" /><KPI label="Demo Given" value={I.demoYes} sub={`${I.total ? ((I.demoYes / I.total) * 100).toFixed(0) : 0}%`} accent="#6366f1" /><KPI label="Quoted" value={I.qs} accent="#f59e0b" /><KPI label="Won" value={I.won} sub={fmt(I.wonRev)} accent="#10b981" /><KPI label="Lost" value={I.lost} accent="#ef4444" /><KPI label="Quote→Win" value={`${qr}%`} accent="#8b5cf6" />
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1.8fr", gap: 14, marginTop: 14 }}>
          <Box>
            <div style={{ fontSize: 11, fontWeight: 600, color: "rgba(255,255,255,0.45)", marginBottom: 12 }}>Lead Quality</div>
            <div style={{ display: "flex", justifyContent: "center" }}><MP data={[{ name: "Hot", value: I.hot, color: "#ef4444" }, { name: "Warm", value: I.warm, color: "#f59e0b" }, { name: "Cold", value: I.cold, color: "#6b7280" }]} size={120} /></div>
            <div style={{ marginTop: 8 }}>{[{ n: "Hot", v: I.hot, c: "#ef4444" }, { n: "Warm", v: I.warm, c: "#f59e0b" }, { n: "Cold", v: I.cold, c: "#6b7280" }].map(q => (<div key={q.n} style={{ display: "flex", justifyContent: "space-between", padding: "4px 0" }}><div style={{ display: "flex", alignItems: "center", gap: 6 }}><span style={{ width: 8, height: 8, borderRadius: 2, background: q.c }} /><span style={{ fontSize: 11, color: "#fff" }}>{q.n}</span></div><span style={{ fontSize: 12, fontWeight: 600, color: "#fff" }}>{q.v}</span></div>))}{I.junk > 0 && <div style={{ fontSize: 10, color: "rgba(255,255,255,0.25)", marginTop: 4 }}>Junk: {I.junk}</div>}</div>
          </Box>
          <Box>
            <div style={{ fontSize: 11, fontWeight: 600, color: "rgba(255,255,255,0.45)", marginBottom: 12 }}>Source Performance</div>
            <ResponsiveContainer width="100%" height={220}><BarChart data={srA} layout="vertical" margin={{ left: 5 }}><CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.03)" horizontal={false} /><XAxis type="number" tick={{ fill: "rgba(255,255,255,0.22)", fontSize: 9 }} axisLine={false} /><YAxis type="category" dataKey="name" tick={{ fill: "rgba(255,255,255,0.42)", fontSize: 9 }} axisLine={false} width={90} /><Tooltip content={<TT />} /><Bar dataKey="hot" stackId="a" fill="#ef4444" name="Hot" /><Bar dataKey="warm" stackId="a" fill="#f59e0b" name="Warm" /><Bar dataKey="cold" stackId="a" fill="#4b5563" radius={[0,3,3,0]} name="Cold" /></BarChart></ResponsiveContainer>
          </Box>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, marginTop: 14 }}>
          <Box>
            <div style={{ fontSize: 11, fontWeight: 600, color: "rgba(255,255,255,0.45)", marginBottom: 10 }}>Top Won Deals</div>
            {I.deals.length === 0 && <div style={{ fontSize: 11, color: "rgba(255,255,255,0.25)" }}>No won deals yet</div>}
            {I.deals.map((d, i) => (<div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "6px 0", borderBottom: i < I.deals.length - 1 ? "1px solid rgba(255,255,255,0.03)" : "none" }}><div><div style={{ fontSize: 11, fontWeight: 600, color: "#fff" }}>{d.name}</div><div style={{ fontSize: 9, color: "rgba(255,255,255,0.25)" }}>{d.product}</div></div><span style={{ fontSize: 13, fontWeight: 700, color: "#10b981" }}>{fmt(d.value)}</span></div>))}
            <div style={{ marginTop: 10, padding: "7px 10px", background: "rgba(16,185,129,0.07)", borderRadius: 6, border: "1px solid rgba(16,185,129,0.12)" }}><span style={{ fontSize: 9, color: "#10b981", fontWeight: 600 }}>TOTAL WON: </span><span style={{ fontSize: 12, fontWeight: 700, color: "#10b981" }}>{fmt(I.wonRev)}</span></div>
          </Box>
          <Box>
            <div style={{ fontSize: 11, fontWeight: 600, color: "rgba(255,255,255,0.45)", marginBottom: 10 }}>Monthly Trend</div>
            <ResponsiveContainer width="100%" height={200}><ComposedChart data={iM}><CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.03)" /><XAxis dataKey="month" tick={{ fill: "rgba(255,255,255,0.3)", fontSize: 9 }} axisLine={false} /><YAxis yAxisId="l" tick={{ fill: "rgba(255,255,255,0.2)", fontSize: 9 }} axisLine={false} /><YAxis yAxisId="r" orientation="right" tick={{ fill: "rgba(255,255,255,0.2)", fontSize: 9 }} axisLine={false} tickFormatter={fmt} /><Tooltip content={<TT />} /><Bar yAxisId="l" dataKey="leads" fill="#3b82f6" radius={[3,3,0,0]} name="Leads" opacity={0.7} /><Bar yAxisId="l" dataKey="won" fill="#10b981" radius={[3,3,0,0]} name="Won" /><Line yAxisId="r" type="monotone" dataKey="revenue" stroke="#f59e0b" strokeWidth={2} dot={{ fill: "#f59e0b", r: 3 }} name="Revenue" /></ComposedChart></ResponsiveContainer>
          </Box>
        </div>
      </>}

      {/* ═══ FIELD ═══ */}
      {tab === "field" && <>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(140px, 1fr))", gap: 10 }}>
          <KPI label="Total Visits" value={F.total} accent="#10b981" /><KPI label="New" value={F.purposeNew} sub={`${F.total ? ((F.purposeNew / F.total) * 100).toFixed(0) : 0}%`} accent="#3b82f6" /><KPI label="Interested" value={F.interested} sub={`${ir}%`} accent="#8b5cf6" /><KPI label="Exp. Revenue" value={fmt(F.revenue)} accent="#f59e0b" /><KPI label="Not Int." value={F.notInterested} accent="#ef4444" />
        </div>
        <Box style={{ marginTop: 14 }}>
          <div style={{ fontSize: 11, fontWeight: 600, color: "rgba(255,255,255,0.45)", marginBottom: 12 }}>Salesperson — Visits & Revenue</div>
          <ResponsiveContainer width="100%" height={240}><ComposedChart data={spA}><CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.03)" /><XAxis dataKey="name" tick={{ fill: "rgba(255,255,255,0.4)", fontSize: 9 }} axisLine={false} /><YAxis yAxisId="l" tick={{ fill: "rgba(255,255,255,0.2)", fontSize: 9 }} axisLine={false} /><YAxis yAxisId="r" orientation="right" tick={{ fill: "rgba(255,255,255,0.2)", fontSize: 9 }} axisLine={false} tickFormatter={fmt} /><Tooltip content={<TT />} /><Bar yAxisId="l" dataKey="newV" stackId="a" fill="#3b82f6" name="New" /><Bar yAxisId="l" dataKey="existV" stackId="a" fill="#10b981" name="Existing" /><Bar yAxisId="l" dataKey="fuV" stackId="a" fill="#f59e0b" name="Follow-up" radius={[3,3,0,0]} /><Line yAxisId="r" type="monotone" dataKey="rev" stroke="#ef4444" strokeWidth={2} dot={{ fill: "#ef4444", r: 3 }} name="Exp. Rev" /></ComposedChart></ResponsiveContainer>
        </Box>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, marginTop: 14 }}>
          <Box>
            <div style={{ fontSize: 11, fontWeight: 600, color: "rgba(255,255,255,0.45)", marginBottom: 12 }}>Products</div>
            <ResponsiveContainer width="100%" height={200}><BarChart data={prA} layout="vertical"><CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.03)" horizontal={false} /><XAxis type="number" tick={{ fill: "rgba(255,255,255,0.2)", fontSize: 9 }} axisLine={false} /><YAxis type="category" dataKey="name" tick={{ fill: "rgba(255,255,255,0.4)", fontSize: 9 }} axisLine={false} width={70} /><Tooltip content={<TT />} /><Bar dataKey="value" radius={[0,3,3,0]} name="Visits">{prA.map((_, i) => <Cell key={i} fill={COLORS[i % COLORS.length]} />)}</Bar></BarChart></ResponsiveContainer>
          </Box>
          <Box>
            <div style={{ fontSize: 11, fontWeight: 600, color: "rgba(255,255,255,0.45)", marginBottom: 12 }}>Locations</div>
            <ResponsiveContainer width="100%" height={200}><BarChart data={loA} layout="vertical"><CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.03)" horizontal={false} /><XAxis type="number" tick={{ fill: "rgba(255,255,255,0.2)", fontSize: 9 }} axisLine={false} /><YAxis type="category" dataKey="name" tick={{ fill: "rgba(255,255,255,0.4)", fontSize: 9 }} axisLine={false} width={85} /><Tooltip content={<TT />} /><Bar dataKey="value" radius={[0,3,3,0]} name="Visits">{loA.map((_, i) => <Cell key={i} fill={COLORS[i % COLORS.length]} />)}</Bar></BarChart></ResponsiveContainer>
          </Box>
        </div>
        <Box style={{ marginTop: 14, overflowX: "auto" }}>
          <div style={{ fontSize: 11, fontWeight: 600, color: "rgba(255,255,255,0.45)", marginBottom: 10 }}>Salesperson Scorecard</div>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 10 }}>
            <thead><tr style={{ borderBottom: "1px solid rgba(255,255,255,0.06)" }}>{["Name","Visits","New","Exist","F/U","Int.","Exp Rev"].map(h => <th key={h} style={{ textAlign: "left", padding: "6px 7px", color: "rgba(255,255,255,0.3)", fontWeight: 600, fontSize: 9, textTransform: "uppercase", letterSpacing: 1 }}>{h}</th>)}</tr></thead>
            <tbody>{spA.map((s, i) => (<tr key={i} style={{ borderBottom: "1px solid rgba(255,255,255,0.025)" }}><td style={{ padding: 7, fontWeight: 600, color: "#fff" }}>{s.name}</td><td style={{ padding: 7 }}>{s.visits}</td><td style={{ padding: 7, color: "#3b82f6" }}>{s.newV}</td><td style={{ padding: 7, color: "#10b981" }}>{s.existV}</td><td style={{ padding: 7, color: "#f59e0b" }}>{s.fuV}</td><td style={{ padding: 7, color: "#8b5cf6" }}>{s.intV}</td><td style={{ padding: 7, color: "#f59e0b", fontWeight: 600 }}>{fmt(s.rev)}</td></tr>))}</tbody>
          </table>
        </Box>
        <Box style={{ marginTop: 14 }}>
          <div style={{ fontSize: 11, fontWeight: 600, color: "rgba(255,255,255,0.45)", marginBottom: 12 }}>Monthly Visits</div>
          <ResponsiveContainer width="100%" height={180}><BarChart data={fM}><CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.03)" /><XAxis dataKey="month" tick={{ fill: "rgba(255,255,255,0.3)", fontSize: 9 }} axisLine={false} /><YAxis tick={{ fill: "rgba(255,255,255,0.2)", fontSize: 9 }} axisLine={false} /><Tooltip content={<TT />} /><Bar dataKey="newV" stackId="a" fill="#3b82f6" name="New" /><Bar dataKey="existV" stackId="a" fill="#10b981" name="Existing" /><Bar dataKey="fuV" stackId="a" fill="#f59e0b" name="Follow-up" radius={[3,3,0,0]} /></BarChart></ResponsiveContainer>
        </Box>
      </>}

      {/* ═══ PIPELINE ═══ */}
      {tab === "pipeline" && <>
        <SH tag="INSIDE" tagColor="#3b82f6" title="Discovery → Demo → Follow-up → Closure" />
        <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 5, marginBottom: 14 }}>
          {[{ l: "Total", v: I.total, c: "#3b82f6" },{ l: "1st Call", v: I.fc, c: "#6366f1" },{ l: "F/U 1", v: I.fu1, c: "#8b5cf6" },{ l: "F/U 2", v: I.fu2, c: "#a855f7" },{ l: "F/U 3", v: I.fu3, c: "#c084fc" },{ l: "Quoted", v: I.qs, c: "#f59e0b" },{ l: "Won", v: I.won, c: "#10b981" }].map((s, i) => <SC key={i} label={s.l} value={s.v} total={i === 0 ? null : I.total} color={s.c} />)}
        </div>
        <Box style={{ marginBottom: 14 }}>
          <div style={{ fontSize: 11, fontWeight: 600, color: "rgba(255,255,255,0.45)", marginBottom: 10 }}>Stage Drop-off</div>
          {[{ f: "Total → 1st Call", a: I.total, b: I.fc },{ f: "1st Call → F/U 1", a: I.fc, b: I.fu1 },{ f: "F/U 1 → F/U 2", a: I.fu1, b: I.fu2 },{ f: "F/U 2 → F/U 3", a: I.fu2, b: I.fu3 },{ f: "F/U → Quoted", a: Math.max(I.fu3, I.fu2, I.fu1, 1), b: I.qs },{ f: "Quoted → Won", a: Math.max(I.qs, 1), b: I.won }].map((x, i) => {
            const p = x.a ? ((1 - x.b / x.a) * 100).toFixed(0) : 0;
            return (<div key={i} style={{ display: "flex", alignItems: "center", gap: 8, padding: "5px 0", borderBottom: i < 5 ? "1px solid rgba(255,255,255,0.025)" : "none" }}><span style={{ width: 110, fontSize: 10, color: "rgba(255,255,255,0.42)" }}>{x.f}</span><div style={{ flex: 1, height: 5, background: "rgba(255,255,255,0.035)", borderRadius: 3, overflow: "hidden" }}><div style={{ width: `${Math.min(p, 100)}%`, height: "100%", background: p > 50 ? "#ef4444" : p > 30 ? "#f59e0b" : "#10b981", borderRadius: 3 }} /></div><span style={{ fontSize: 10, fontWeight: 700, color: p > 50 ? "#ef4444" : p > 30 ? "#f59e0b" : "#10b981", width: 38, textAlign: "right" }}>-{p}%</span><span style={{ fontSize: 9, color: "rgba(255,255,255,0.2)", width: 34, textAlign: "right" }}>({x.a - x.b})</span></div>);
          })}
        </Box>
        <SH tag="FIELD" tagColor="#10b981" title="Visit → Interest → Revenue" />
        <div style={{ display: "grid", gridTemplateColumns: "repeat(5, 1fr)", gap: 5, marginBottom: 14 }}>
          {[{ l: "Visits", v: F.total, c: "#10b981" },{ l: "New", v: F.purposeNew, c: "#3b82f6" },{ l: "Interested", v: F.interested, c: "#8b5cf6" },{ l: "Follow-up", v: F.purposeFU, c: "#f59e0b" },{ l: "Not Int.", v: F.notInterested, c: "#ef4444" }].map((s, i) => <SC key={i} label={s.l} value={s.v} total={i === 0 ? null : F.total} color={s.c} />)}
        </div>
        <div style={{ background: "linear-gradient(135deg, rgba(59,130,246,0.05), rgba(16,185,129,0.05))", borderRadius: 12, padding: 20, border: "1px solid rgba(255,255,255,0.06)", marginTop: 14 }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: "#fff", marginBottom: 12 }}>Revenue Summary</div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 14 }}>
            {[{ l: "Inside Won", v: I.wonRev, c: "#3b82f6", s: `${I.won} closed` },{ l: "Field Expected", v: F.revenue, c: "#10b981", s: `${F.interested} interested` },{ l: "Total Pipeline", v: I.wonRev + F.revenue, c: "#f59e0b", s: "Won + Expected" }].map((x, i) => (<div key={i}><div style={{ fontSize: 9, color: "rgba(255,255,255,0.3)", fontWeight: 600, letterSpacing: 1, textTransform: "uppercase" }}>{x.l}</div><div style={{ fontSize: 22, fontWeight: 700, color: x.c, marginTop: 2 }}>{fmt(x.v)}</div><div style={{ fontSize: 10, color: "rgba(255,255,255,0.25)" }}>{x.s}</div></div>))}
          </div>
        </div>
        <Box style={{ marginTop: 14 }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: "#fff", marginBottom: 10 }}>Key Insights</div>
          {[{ i: "🔴", t: `${I.total ? ((1 - I.fc / I.total) * 100).toFixed(0) : 0}% of inside leads never get a 1st call — biggest leak.` },{ i: "🟡", t: "Google Ads generates volume but mostly Cold leads — review targeting." },{ i: "🟢", t: "Customer Referrals have highest win rate — invest in referral programs." },{ i: "🔵", t: "AIS-140 dominates field visits. Cross-sell Fuel Sensor & Dashcam." },{ i: "🟡", t: `Quote→Win rate is ${qr}% — follow up within 48h of sending quotes.` },{ i: "🟢", t: `Field interest rate is ${ir}% — strong lead qualification.` },{ i: "🔴", t: `${I.junk} junk leads in pipeline — tighten form validation.` }].map((x, i) => (<div key={i} style={{ display: "flex", gap: 7, padding: "5px 0", borderBottom: i < 6 ? "1px solid rgba(255,255,255,0.025)" : "none" }}><span style={{ fontSize: 12 }}>{x.i}</span><span style={{ fontSize: 11, color: "rgba(255,255,255,0.55)", lineHeight: 1.5 }}>{x.t}</span></div>))}
        </Box>
      </>}

      <div style={{ textAlign: "center", marginTop: 24, paddingBottom: 12 }}>
        <span style={{ fontSize: 9, color: "rgba(255,255,255,0.1)" }}>Aditi Tracking · 🔒 Private Sheets · Live Dashboard</span>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<Dashboard />);
